function Notes({ ctx }) {
  const { currentUser, folders, notes, p, showToast } = ctx;
  const [openFolderId, setOpenFolderId] = useState(null);
  const [openNoteId, setOpenNoteId] = useState(null);
  const [showFolderForm, setShowFolderForm] = useState(false);
  const [editingFolder, setEditingFolder] = useState(null);
  const [showAddChoice, setShowAddChoice] = useState(false); // Auswahl: Mappe oder Notiz

  const openFolder = folders.find((f) => f.id === openFolderId);
  const openNote = notes.find((n) => n.id === openNoteId);

  // Neue lose Notiz (ohne Mappe) anlegen
  const createLooseNote = async () => {
    const newNote = {
      id: uid(), folderId: null, title: "", content: "",
      checklist: [], images: [], files: [],
      createdBy: currentUser, createdAt: Date.now(), updatedAt: Date.now(),
    };
    await p.notes([...notes, newNote]);
    setShowAddChoice(false);
    setOpenNoteId(newNote.id);
  };

  if (openNote) {
    return h(NoteEditor, {
      note: openNote,
      currentUser,
      folder: folders.find((f) => f.id === openNote.folderId),
      onClose: () => setOpenNoteId(null),
      onSave: async (updated) => {
        await p.notes(notes.map((n) => n.id === updated.id ? updated : n));
        showToast("Notiz gespeichert");
      },
      onDelete: async () => {
        if (!confirm("Notiz wirklich löschen?")) return;
        await p.notes(notes.filter((n) => n.id !== openNote.id));
        setOpenNoteId(null);
        showToast("Gelöscht");
      }
    });
  }

  if (openFolder) {
    return h(FolderDetail, {
      folder: openFolder,
      notes: notes.filter((n) => n.folderId === openFolder.id),
      currentUser,
      onBack: () => setOpenFolderId(null),
      onOpenNote: (id) => setOpenNoteId(id),
      onAddNote: async () => {
        const newNote = {
          id: uid(), folderId: openFolder.id, title: "", content: "",
          checklist: [], images: [], files: [],
          createdBy: currentUser, createdAt: Date.now(), updatedAt: Date.now(),
        };
        await p.notes([...notes, newNote]);
        setOpenNoteId(newNote.id);
      },
      onEditFolder: () => { setEditingFolder(openFolder); setShowFolderForm(true); },
      onDeleteFolder: async () => {
        if (!confirm(`Mappe "${openFolder.name}" und alle Notizen darin löschen?`)) return;
        await Promise.all([
          p.folders(folders.filter((f) => f.id !== openFolder.id)),
          p.notes(notes.filter((n) => n.folderId !== openFolder.id)),
        ]);
        setOpenFolderId(null);
        showToast("Mappe gelöscht");
      }
    });
  }

  // Lose Notizen (ohne Mappe) — folderId null/undefined
  const looseNotes = notes
    .filter((n) => !n.folderId)
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  const sortedFolders = folders.slice().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  const isEmpty = folders.length === 0 && looseNotes.length === 0;

  // Vorschautext für lose Notiz
  const notePreview = (n) => n.content ? n.content.slice(0, 60)
    : n.checklist?.length > 0 ? `${n.checklist.filter((x) => x.done).length}/${n.checklist.length} erledigt`
    : n.images?.length > 0 ? `${n.images.length} Bild${n.images.length === 1 ? "" : "er"}`
    : n.files?.length > 0 ? `${n.files.length} PDF${n.files.length === 1 ? "" : "s"}` : "Leere Notiz";

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Notizen", subtitle: "Mappen & einzelne Notizen" }),

    isEmpty && h(Empty, { text: "Noch nichts da — leg deine erste Notiz oder Mappe an ✿" }),

    // MAPPEN
    sortedFolders.length > 0 && h("div", { style: { marginBottom: looseNotes.length > 0 ? 22 : 0 } },
      h("div", { style: { ...st.eyebrow, marginBottom: 10 } }, "Mappen"),
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
        sortedFolders.map((f) => {
          const noteCount = notes.filter((n) => n.folderId === f.id).length;
          return h("button", { key: f.id, onClick: () => setOpenFolderId(f.id),
            style: {
              ...st.card, padding: 18, textAlign: "left",
              background: f.color ? `${f.color}10` : c.surface,
              borderColor: f.color ? `${f.color}40` : c.border,
              minHeight: 130, display: "flex", flexDirection: "column", justifyContent: "space-between",
            }
          },
            h("div", { style: { fontSize: 28 } }, f.icon || "📓"),
            h("div", null,
              h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 19, fontWeight: 500, color: c.ink, letterSpacing: -0.3, lineHeight: 1.1, marginBottom: 4 } }, f.name),
              h("div", { style: { fontSize: 11, color: c.inkSoft } }, `${noteCount} ${noteCount === 1 ? "Notiz" : "Notizen"}`)
            )
          );
        })
      )
    ),

    // LOSE NOTIZEN
    looseNotes.length > 0 && h("div", null,
      h("div", { style: { ...st.eyebrow, marginBottom: 10 } }, "Einzelne Notizen"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        looseNotes.map((n) =>
          h("button", { key: n.id, onClick: () => setOpenNoteId(n.id),
            style: { ...st.card, padding: 14, textAlign: "left" }
          },
            h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 15, marginBottom: 3 } }, n.title || "Ohne Titel"),
            h("div", { style: { fontSize: 12.5, color: c.inkSoft, lineHeight: 1.4, overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" } }, notePreview(n)),
            h("div", { style: { fontSize: 11, color: c.inkFaint, marginTop: 6, display: "flex", gap: 8, alignItems: "center" } },
              h("span", null, n.createdBy),
              h("span", null, "·"),
              h("span", null, fmtDate(new Date(n.updatedAt || n.createdAt).toISOString().slice(0, 10), { day: "numeric", month: "short" })),
              n.images?.length > 0 && h("span", { style: { marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 3 } }, I.Image({ size: 11 }), n.images.length),
              n.files?.length > 0 && h("span", { style: { marginLeft: n.images?.length > 0 ? 0 : "auto", display: "inline-flex", alignItems: "center", gap: 3 } }, I.FileText({ size: 11 }), n.files.length)
            )
          )
        )
      )
    ),

    h(FAB, { onClick: () => setShowAddChoice(true) }),

    // Auswahl-Dialog: Mappe oder einzelne Notiz
    showAddChoice && h(Modal, { onClose: () => setShowAddChoice(false), title: "Was möchtest du anlegen?" },
      h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
        h("button", { onClick: createLooseNote,
          style: { ...st.row, padding: "16px 16px", width: "100%", textAlign: "left", gap: 14 }
        },
          h("div", { style: { width: 42, height: 42, borderRadius: 10, background: c.accentSoft, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 } },
            I.NoteBook({ size: 20, color: c.accent })
          ),
          h("div", { style: { flex: 1 } },
            h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 15 } }, "Einzelne Notiz"),
            h("div", { style: { fontSize: 12, color: c.inkSoft, marginTop: 1 } }, "Schnell etwas festhalten")
          ),
          I.ChevLeft({ size: 16, color: c.inkFaint, style: { transform: "rotate(180deg)" } })
        ),
        h("button", { onClick: () => { setShowAddChoice(false); setEditingFolder(null); setShowFolderForm(true); },
          style: { ...st.row, padding: "16px 16px", width: "100%", textAlign: "left", gap: 14 }
        },
          h("div", { style: { width: 42, height: 42, borderRadius: 10, background: c.forestSoft, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 } },
            I.Folder({ size: 20, color: c.forest })
          ),
          h("div", { style: { flex: 1 } },
            h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 15 } }, "Mappe"),
            h("div", { style: { fontSize: 12, color: c.inkSoft, marginTop: 1 } }, "Mehrere Notizen bündeln (z. B. Urlaub)")
          ),
          I.ChevLeft({ size: 16, color: c.inkFaint, style: { transform: "rotate(180deg)" } })
        )
      )
    ),

    showFolderForm && h(FolderForm, {
      editing: editingFolder,
      onClose: () => { setShowFolderForm(false); setEditingFolder(null); },
      onSave: async (folder) => {
        if (editingFolder) {
          await p.folders(folders.map((f) => f.id === folder.id ? folder : f));
          showToast("Aktualisiert");
        } else {
          await p.folders([...folders, folder]);
          showToast("Mappe angelegt", "success");
        }
        setShowFolderForm(false); setEditingFolder(null);
      }
    })
  );
}

// Vollbild-Bildbetrachter mit Navigation zwischen mehreren Bildern
function ImageLightbox({ images, startIndex, onClose }) {
  const [idx, setIdx] = useState(startIndex || 0);
  const startX = useRef(0);
  const [dx, setDx] = useState(0);

  const prev = () => setIdx((i) => (i > 0 ? i - 1 : i));
  const next = () => setIdx((i) => (i < images.length - 1 ? i + 1 : i));

  // Tastatur-Navigation (Desktop)
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowLeft") prev();
      else if (e.key === "ArrowRight") next();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [images.length]);

  const img = images[idx];
  if (!img) return null;

  return h("div", {
    style: {
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(20,18,16,0.94)",
      display: "flex", flexDirection: "column",
      animation: "fadeIn 0.18s ease",
    },
    onClick: onClose,
  },
    // Kopfzeile: Zähler + Schließen
    h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 18px", flexShrink: 0 } },
      h("span", { style: { color: "rgba(255,255,255,0.7)", fontSize: 13, fontWeight: 500 } },
        images.length > 1 ? `${idx + 1} / ${images.length}` : ""
      ),
      h("button", { onClick: onClose,
        style: { width: 38, height: 38, borderRadius: "50%", background: "rgba(255,255,255,0.12)", border: "none", display: "flex", alignItems: "center", justifyContent: "center" }
      }, I.X({ size: 20, color: "#fff", strokeWidth: 2 }))
    ),
    // Bild
    h("div", {
      style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", padding: "0 12px" },
      onClick: (e) => e.stopPropagation(),
      onTouchStart: (e) => { startX.current = e.touches[0].clientX; },
      onTouchMove: (e) => { setDx(e.touches[0].clientX - startX.current); },
      onTouchEnd: () => {
        if (dx > 60) prev();
        else if (dx < -60) next();
        setDx(0);
      },
    },
      h("img", {
        src: img.data, alt: img.name || "",
        style: { maxWidth: "100%", maxHeight: "100%", objectFit: "contain", borderRadius: 8, transform: `translateX(${dx}px)`, transition: dx === 0 ? "transform 0.2s" : "none" }
      })
    ),
    // Navigation unten (nur bei mehreren Bildern)
    images.length > 1 && h("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 28, padding: "20px 0 28px", flexShrink: 0 },
      onClick: (e) => e.stopPropagation() },
      h("button", { onClick: prev, disabled: idx === 0,
        style: { width: 48, height: 48, borderRadius: "50%", background: idx === 0 ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.15)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", opacity: idx === 0 ? 0.4 : 1 }
      }, I.ChevLeft({ size: 22, color: "#fff", strokeWidth: 2 })),
      h("button", { onClick: next, disabled: idx === images.length - 1,
        style: { width: 48, height: 48, borderRadius: "50%", background: idx === images.length - 1 ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.15)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", opacity: idx === images.length - 1 ? 0.4 : 1, transform: "rotate(180deg)" }
      }, I.ChevLeft({ size: 22, color: "#fff", strokeWidth: 2 }))
    )
  );
}

function NoteEditor({ note, folder, currentUser, onClose, onSave, onDelete }) {
  const [title, setTitle] = useState(note.title || "");
  const [content, setContent] = useState(note.content || "");
  const [checklist, setChecklist] = useState(note.checklist || []);
  const [images, setImages] = useState(note.images || []);
  const [files, setFiles] = useState(note.files || []); // PDFs & andere Dateien
  const [newChecklistItem, setNewChecklistItem] = useState("");
  const [showChecklist, setShowChecklist] = useState((note.checklist || []).length > 0);
  const [lightboxIdx, setLightboxIdx] = useState(null); // Index des großen Bildes, oder null
  const fileInputRef = useRef(null);
  const pdfInputRef = useRef(null);

  const saveTimerRef = useRef(null);
  const autoSave = (updates) => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      onSave({
        ...note,
        title: updates.title ?? title,
        content: updates.content ?? content,
        checklist: updates.checklist ?? checklist,
        images: updates.images ?? images,
        files: updates.files ?? files,
        updatedAt: Date.now(),
      });
    }, 800);
  };

  useEffect(() => () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); }, []);

  const onTitleChange = (v) => { setTitle(v); autoSave({ title: v }); };
  const onContentChange = (v) => { setContent(v); autoSave({ content: v }); };

  const addCheck = () => {
    const v = newChecklistItem.trim();
    if (!v) return;
    const next = [...checklist, { id: uid(), text: v, done: false }];
    setChecklist(next);
    setNewChecklistItem("");
    autoSave({ checklist: next });
  };

  const toggleCheck = (id) => {
    const next = checklist.map((x) => x.id === id ? { ...x, done: !x.done } : x);
    setChecklist(next);
    autoSave({ checklist: next });
  };

  const removeCheck = (id) => {
    const next = checklist.filter((x) => x.id !== id);
    setChecklist(next);
    autoSave({ checklist: next });
  };

  const handleImageUpload = async (fileList) => {
    for (const file of fileList) {
      if (!file.type.startsWith("image/")) continue;
      try {
        const compressed = await compressImage(file, 1200, 0.7);
        const next = [...images, { id: uid(), data: compressed, name: file.name }];
        setImages(next);
        autoSave({ images: next });
      } catch (e) {
        console.error("Image compression failed", e);
      }
    }
  };

  const removeImage = (id) => {
    if (!confirm("Bild löschen?")) return;
    const next = images.filter((x) => x.id !== id);
    setImages(next);
    autoSave({ images: next });
  };

  const MAX_PDF_BYTES = 700 * 1024; // ~700 KB Limit (Firestore-Sicherheit)
  const handlePdfUpload = async (fileList) => {
    for (const file of fileList) {
      const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
      if (!isPdf) { alert(`"${file.name}" ist kein PDF.`); continue; }
      if (file.size > MAX_PDF_BYTES) {
        alert(`"${file.name}" ist zu groß (${(file.size / 1024 / 1024).toFixed(1)} MB).\n\nMaximal erlaubt sind 0,7 MB. Tipp: PDF vorher z. B. mit einem Online-Tool komprimieren oder als Bild abfotografieren.`);
        continue;
      }
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const next = [...files, { id: uid(), data: dataUrl, name: file.name, size: file.size, addedBy: currentUser }];
        setFiles(next);
        autoSave({ files: next });
      } catch (e) {
        console.error("PDF upload failed", e);
        alert("Konnte das PDF nicht laden.");
      }
    }
  };

  const removePdf = (id) => {
    if (!confirm("PDF löschen?")) return;
    const next = files.filter((x) => x.id !== id);
    setFiles(next);
    autoSave({ files: next });
  };

  const openPdf = (file) => {
    // PDF in neuem Tab öffnen — Base64 in Blob umwandeln für bessere Kompatibilität
    try {
      const base64 = file.data.split(",")[1];
      const byteChars = atob(base64);
      const byteNums = new Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
      const blob = new Blob([new Uint8Array(byteNums)], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      // URL nach kurzer Zeit freigeben
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (e) {
      console.error("PDF open failed", e);
      // Fallback: direkt die Data-URL öffnen
      window.open(file.data, "_blank");
    }
  };

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 } },
      h("button", { onClick: onClose, style: st.iconBtn, "aria-label": "Zurück" }, I.ChevLeft({ color: c.inkSoft, size: 16 })),

    h("div", { style: { fontSize: 11, color: c.inkFaint, marginBottom: 16 } },

    h("textarea", { value: content, onChange: (e) => onContentChange(e.target.value),

      placeholder: "Schreib hier los…"

    // Checkliste

      },

          I.ListChecks({ size: 16, color: c.inkSoft }),
          h("span", { style: { fontSize: 13.5, color: c.ink, fontWeight: 500 } }, "Checkliste"),
          checklist.length > 0 && h("span", { style: { fontSize: 11, color: c.inkSoft } }, `${checklist.filter((x) => x.done).length}/${checklist.length}`)
        ),
        h("span", { style: { transform: showChecklist ? "rotate(180deg)" : "none", transition: "0.2s", display: "inline-flex" } }, I.ChevDown({ size: 15, color: c.inkFaint }))
      ),

      showChecklist && h("div", { style: { marginTop: 8, display: "flex", flexDirection: "column", gap: 6 } },

    ),

    // Bilder
    h("div", { style: { marginTop: 18 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
        h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },

        ),

      images.length > 0 && h("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6 } },

  );
}

// Bildkomprimierung — verhindert dass Firestore-Dokumente > 1 MB werden
async function compressImage(file, maxDim = 1200, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = (height / width) * maxDim; width = maxDim; }
          else { width = (width / height) * maxDim; height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// STATS
// ============================================================
function Stats({ ctx }) {
  const { expenses, categories, users, budgets, tasks } = ctx;
  const [selectedMonth, setSelectedMonth] = useState(today().slice(0, 7));

  const monthExpenses = expenses.filter((e) => e.scope === "shared" && e.date.startsWith(selectedMonth));

  // Aufgaben-Erledigungen pro Person, im gewählten Monat (aus der history)
  const taskStats = useMemo(() => {
    const counts = {};
    users.forEach((u) => { counts[u] = 0; });
    let totalDone = 0;
    (tasks || []).forEach((t) => {
      (t.history || []).forEach((entry) => {
        if (entry.date && entry.date.startsWith(selectedMonth) && entry.by in counts) {
          counts[entry.by]++;
          totalDone++;
        }
      });
    });
    return { counts, totalDone };
  }, [tasks, users, selectedMonth]);

  const byCategory = useMemo(() => {
    const map = {};
    monthExpenses.forEach((e) => { map[e.category] = (map[e.category] || 0) + e.amount; });
    return Object.entries(map)
      .map(([name, value]) => {
        const meta = getCat(categories, name);
        return { name, value, color: meta.color, icon: meta.icon };
      })
      .sort((a, b) => b.value - a.value);
  }, [monthExpenses, categories]);

  const total = byCategory.reduce((s, x) => s + x.value, 0);

  const last12 = useMemo(() => {
    const months = [];
    const now = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.toISOString().slice(0, 7);
      const label = d.toLocaleDateString("de-DE", { month: "short" });
      const sum = expenses.filter((e) => e.scope === "shared" && e.date.startsWith(key)).reduce((s, e) => s + e.amount, 0);
      months.push({ label, sum: Math.round(sum), key });
    }
    return months;
  }, [expenses]);

  const monthsWithData = last12.filter((m) => m.sum > 0);
  const avgMonth = monthsWithData.length > 0 ? monthsWithData.reduce((s, m) => s + m.sum, 0) / monthsWithData.length : 0;
  const lastMonth = last12[last12.length - 2]?.sum || 0;
  const thisMonthSum = last12[last12.length - 1]?.sum || 0;
  const trend = lastMonth > 0 ? ((thisMonthSum - lastMonth) / lastMonth) * 100 : 0;

  const byUser = useMemo(() => users.map((u) => ({
    name: u,
    sum: monthExpenses.filter((e) => e.paidBy === u).reduce((s, e) => s + e.amount, 0),
  })), [monthExpenses, users]);

  const monthOptions = useMemo(() => {
    const set = new Set();
    expenses.forEach((e) => set.add(e.date.slice(0, 7)));
    set.add(today().slice(0, 7));
    return Array.from(set).sort((a, b) => b.localeCompare(a));
  }, [expenses]);

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Statistiken", subtitle: "Geteilte Ausgaben" }),
    h("select", { value: selectedMonth, onChange: (e) => setSelectedMonth(e.target.value), style: { ...st.input, marginBottom: 16 } },
      monthOptions.map((m) => h("option", { key: m, value: m }, monthName(m)))
    ),
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 } },
      h("div", { style: { ...st.card, padding: 16 } },
        h("div", { style: st.eyebrow }, "Gesamt"),
        h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 500, color: c.ink, marginTop: 6, letterSpacing: -0.5 } }, fmtEURc(total)),
        h("div", { style: { fontSize: 11, color: c.inkSoft, marginTop: 2 } },
          `${monthExpenses.length} ${monthExpenses.length === 1 ? "Eintrag" : "Einträge"}`
        )
      ),
      h("div", { style: { ...st.card, padding: 16 } },
        h("div", { style: st.eyebrow }, "vs. Vormonat"),
        h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 500, color: trend > 0 ? c.warn : c.success, marginTop: 6, letterSpacing: -0.5 } },
          lastMonth > 0 ? `${trend > 0 ? "+" : ""}${Math.round(trend)}%` : "—"
        ),
        h("div", { style: { fontSize: 11, color: c.inkSoft, marginTop: 2 } }, `Ø ${fmtEURc(avgMonth)}`)
      )
    ),
    byCategory.length > 0 && h("div", { style: { ...st.card, padding: 18, marginBottom: 14 } },
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 500, color: c.ink, fontStyle: "italic", marginBottom: 14 } }, "Nach Kategorie"),
      h("div", { style: { height: 180 } },
        h(ResponsiveContainer, { width: "100%", height: "100%" },
          h(PieChart, null,
            h(Pie, { data: byCategory, dataKey: "value", nameKey: "name", innerRadius: 50, outerRadius: 78, paddingAngle: 2 },
              byCategory.map((entry, i) => h(Cell, { key: i, fill: entry.color }))
            ),
            h(Tooltip, { formatter: (v) => fmtEUR(v), contentStyle: { background: c.surface, border: `1px solid ${c.border}`, borderRadius: 8, fontSize: 12 } })
          )
        )
      ),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginTop: 12 } },
        byCategory.map((cat) => {
          const budget = budgets[cat.name];

          return h("div", { key: cat.name, style: { display: "flex", flexDirection: "column", gap: 5 } },
            h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between" } },
              h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                h("div", { style: { width: 7, height: 7, borderRadius: 2, background: cat.color } }),
                h("span", { style: { fontSize: 13, color: c.ink } }, `${cat.icon} ${cat.name}`)

              h("div", { style: { fontSize: 13, color: overBudget ? c.warn : c.ink, fontWeight: 500 } },

          );
        })
      )
    ),
    h("div", { style: { ...st.card, padding: 18, marginBottom: 14 } },
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 500, color: c.ink, fontStyle: "italic", marginBottom: 14 } }, "Verlauf · 12 Monate"),
      h("div", { style: { height: 160 } },
        h(ResponsiveContainer, { width: "100%", height: "100%" },
          h(AreaChart, { data: last12, margin: { top: 5, right: 10, left: -15, bottom: 0 } },

            h(CartesianGrid, { strokeDasharray: "3 3", stroke: c.border }),
            h(XAxis, { dataKey: "name", stroke: c.inkSoft, fontSize: 11 }),
            h(YAxis, { stroke: c.inkSoft, fontSize: 11, tickFormatter: (v) => v >= 1000 ? `${(v / 1000).toFixed(1)}k` : v }),

    ),

    // Aufgaben-Verteilung
    taskStats.totalDone > 0 && h("div", { style: { ...st.card, padding: 18, marginTop: 14 } },
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 500, color: c.ink, fontStyle: "italic", marginBottom: 4 } }, "Wer hat angepackt"),
      h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginBottom: 16 } }, `${taskStats.totalDone} erledigte Aufgaben diesen Monat`),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
        users.map((u, i) => {
          const count = taskStats.counts[u] || 0;
          const pct = taskStats.totalDone > 0 ? Math.round((count / taskStats.totalDone) * 100) : 0;
          const barColor = i === 0 ? c.accent : c.forest;
          return h("div", { key: u, style: { display: "flex", flexDirection: "column", gap: 5 } },
            h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between" } },
              h("span", { style: { fontSize: 13.5, color: c.ink, fontWeight: 500 } }, u),
              h("span", { style: { fontSize: 13, color: c.inkSoft } },
                `${count} ${count === 1 ? "Aufgabe" : "Aufgaben"} · ${pct}%`
              )
            ),
            h("div", { style: { ...st.progressTrack, height: 8 } },
              h("div", { style: { ...st.progressFill, width: `${pct}%`, background: barColor, height: 8 } })
            )
          );
        })
      ),
      // Fairness-Hinweis
      (() => {
        const vals = users.map((u) => taskStats.counts[u] || 0);
        const max = Math.max(...vals), min = Math.min(...vals);
        const balanced = max === 0 || (min / max) >= 0.7;
        return h("div", { style: { marginTop: 14, padding: "10px 12px", background: balanced ? c.successBg : c.warnBg, borderRadius: 10, fontSize: 12, color: balanced ? c.success : c.warn, lineHeight: 1.5 } },
          balanced ? "Schön ausgewogen — gut gemacht, ihr zwei! ✿" : "Diesen Monat etwas ungleich verteilt. Vielleicht beim nächsten Mal tauschen?"
        );
      })()
    )
  );
}

function SettingsView({ ctx }) {
  const { categories, budgets, users, expenses, tasks, shopping, recurring, settlements, pin, p, showToast } = ctx;
  const [section, setSection] = useState("categories");

  const exportJSON = () => {
    const data = { expenses, tasks, shopping, categories, budgets, recurring, settlements, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `haushalt-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast("Backup heruntergeladen", "success");
  };

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Einstellungen" }),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 } },
      [
        { id: "categories", label: "Kategorien & Budgets" },
        { id: "users", label: "Personen" },
        { id: "pin", label: "PIN ändern" },
        { id: "data", label: "Daten exportieren" },
      ].map((s) =>
        h("button", { key: s.id, onClick: () => setSection(section === s.id ? null : s.id),
          style: { ...st.row, justifyContent: "space-between", padding: "14px 16px", background: section === s.id ? c.surfaceAlt : c.surface }
        },
          h("span", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5 } }, s.label),
          h("span", { style: { transform: section === s.id ? "rotate(180deg)" : "none", transition: "0.2s", display: "inline-flex" } },
            I.ChevDown({ size: 15, color: c.inkFaint })
          )
        )
      )
    ),
    section === "categories" && h(CategoryEditor, { categories, setCategories: p.categories, budgets, setBudgets: p.budgets, showToast }),
    section === "users" && h(UserEditor, { users, setUsers: p.users, showToast }),
    section === "pin" && h(PinEditor, { pin, setPin: p.pin, showToast }),
    section === "data" && h("div", null,
      h("div", { style: { fontSize: 15, color: c.inkSoft, marginBottom: 14, lineHeight: 1.6, fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif" } },
        "Sicherheitskopie aller Daten als JSON-Datei herunterladen."
      ),
      h("button", { onClick: exportJSON, style: { ...st.row, justifyContent: "space-between", padding: "14px 16px", width: "100%" } },
        h("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
          I.Cloud({ size: 18, color: c.forest }),
          h("div", { style: { textAlign: "left" } },
            h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 15 } }, "Backup herunterladen"),
            h("div", { style: { fontSize: 12, color: c.inkSoft, marginTop: 1 } }, "JSON-Datei mit allen Daten")
          )
        ),
        I.Arrow({ size: 16, color: c.inkSoft })
      ),
      h("div", { style: { marginTop: 20, padding: 14, background: c.surfaceAlt, borderRadius: 12, fontSize: 12, color: c.inkSoft, lineHeight: 1.6 } },
        h("strong", { style: { color: c.ink, fontWeight: 500 } }, "Übersicht:"), h("br"),
        `${expenses.length} Ausgaben · ${tasks.length} Aufgaben · ${shopping.length} Einkaufs-Einträge`, h("br"),
        `${categories.length} Kategorien · ${recurring.length} Vorlagen · ${settlements.length} Ausgleiche`
      )
    )
  );
}

function PinEditor({ pin, setPin, showToast }) {
  const [current, setCurrent] = useState("");
  const [next, setNext] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    setError("");
    if (current !== pin) {
      setError("Aktueller PIN stimmt nicht");
      return;
    }
    if (!/^\d{4,6}$/.test(next)) {
      setError("Neuer PIN muss 4–6 Ziffern haben");
      return;
    }
    if (next !== confirm) {
      setError("PINs stimmen nicht überein");
      return;
    }
    setSaving(true);
    await setPin(next);
    setSaving(false);
    setCurrent(""); setNext(""); setConfirm("");
    showToast("PIN aktualisiert", "success");
  };

  return h("div", null,
    h("div", { style: { fontSize: 15, color: c.inkSoft, marginBottom: 14, lineHeight: 1.6, fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif" } },
      "Der neue PIN gilt für euch beide. 4–6 Ziffern."
    ),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
      h(Field, { label: "Aktueller PIN" },
        h("input", { type: "password", inputMode: "numeric", pattern: "[0-9]*", maxLength: 6,
          value: current, onChange: (e) => setCurrent(e.target.value.replace(/\D/g, "")),
          style: { ...st.input, letterSpacing: 4, fontSize: 18 },
          autoComplete: "off"
        })
      ),
      h(Field, { label: "Neuer PIN" },
        h("input", { type: "password", inputMode: "numeric", pattern: "[0-9]*", maxLength: 6,
          value: next, onChange: (e) => setNext(e.target.value.replace(/\D/g, "")),
          style: { ...st.input, letterSpacing: 4, fontSize: 18 },
          autoComplete: "new-password"
        })
      ),
      h(Field, { label: "Neuer PIN (wiederholen)" },
        h("input", { type: "password", inputMode: "numeric", pattern: "[0-9]*", maxLength: 6,
          value: confirm, onChange: (e) => setConfirm(e.target.value.replace(/\D/g, "")),
          style: { ...st.input, letterSpacing: 4, fontSize: 18 },
          autoComplete: "new-password"
        })
      ),
      error && h("div", { style: { fontSize: 13, color: c.warn, padding: "6px 10px", background: c.warnBg, borderRadius: 8 } }, error),
      h("button", { onClick: submit, disabled: saving, style: { ...st.primaryBtn, opacity: saving ? 0.6 : 1 } },
        saving ? "Wird gespeichert…" : "PIN ändern"
      ),
      h("div", { style: { marginTop: 8, padding: 12, background: c.surfaceAlt, borderRadius: 10, fontSize: 12, color: c.inkSoft, lineHeight: 1.6 } },
        h("strong", { style: { color: c.ink, fontWeight: 500 } }, "Hinweis: "),
        "Beide Geräte verwenden denselben PIN. Wer eingeloggt bleibt, muss erst beim nächsten Sperren neu eingeben."
      )
    )
  );
}

function CategoryEditor({ categories, setCategories, budgets, setBudgets, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);

  return h("div", null,
    h("div", { style: { fontSize: 15, color: c.inkSoft, marginBottom: 14, lineHeight: 1.6, fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif" } },
      "Monatsbudgets erscheinen als Fortschrittsbalken im Dashboard."
    ),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
      categories.map((cat) =>
        h("div", { key: cat.name, style: { ...st.row, padding: "12px 14px" } },
          h("div", { style: { width: 34, height: 34, borderRadius: 9, background: `${cat.color}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 } }, cat.icon),
          h("div", { style: { flex: 1, marginLeft: 12, minWidth: 0 } },
            h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14 } }, cat.name),
            h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginTop: 1 } },
              `Budget: ${budgets[cat.name] ? fmtEUR(budgets[cat.name]) : "—"}`
            )
          ),
          h("button", { onClick: () => setEditing(cat), style: st.miniBtn }, I.Edit({ size: 12, color: c.inkSoft })),
          h("button", { onClick: async () => {
            if (!confirm(`Kategorie "${cat.name}" entfernen?`)) return;
            await setCategories(categories.filter((x) => x.name !== cat.name));
            const { [cat.name]: _, ...rest } = budgets;
            await setBudgets(rest);
            showToast("Entfernt");
          }, style: st.miniBtn }, I.Trash({ size: 12, color: c.inkSoft }))
        )
      )
    ),
    h("button", { onClick: () => setShowAdd(true), style: { ...st.primaryBtn, marginTop: 14 } },
      I.Plus({ size: 15, strokeWidth: 2, color: c.surface }), " Kategorie hinzufügen"
    ),
    editing && h(CategoryForm, { editing, budgetValue: budgets[editing.name], onClose: () => setEditing(null),
      onSave: async (updated, budget) => {
        const newCats = categories.map((cat) => cat.name === editing.name ? updated : cat);
        await setCategories(newCats);
        const newBudgets = { ...budgets };
        if (editing.name !== updated.name) delete newBudgets[editing.name];
        if (budget > 0) newBudgets[updated.name] = budget;
        else delete newBudgets[updated.name];
        await setBudgets(newBudgets);
        setEditing(null);
        showToast("Gespeichert", "success");
      }
    }),
    showAdd && h(CategoryForm, { editing: null, onClose: () => setShowAdd(false),
      onSave: async (cat, budget) => {
        await setCategories([...categories, cat]);
        if (budget > 0) await setBudgets({ ...budgets, [cat.name]: budget });
        setShowAdd(false);
        showToast("Angelegt", "success");
      }
    })
  );
}

function CategoryForm({ editing, budgetValue, onClose, onSave }) {
  const [name, setName] = useState(editing?.name || "");
  const [icon, setIcon] = useState(editing?.icon || "•");
  const [color, setColor] = useState(editing?.color || c.accent);
  const [budget, setBudget] = useState(budgetValue ? String(budgetValue) : "");
  const colors = [c.accent, c.forest, c.ochre, "#7BA098", "#D89A8A", "#A0522D", "#6B8E7F", "#9B8AA0", "#8B7355", "#B0826B"];

  return h(Modal, { onClose, title: editing ? "Bearbeiten" : "Neue Kategorie" },
    h(Field, { label: "Name" }, h("input", { value: name, onChange: (e) => setName(e.target.value), style: st.input, placeholder: "z. B. Tierbedarf", autoFocus: true })),
    h(Field, { label: "Symbol (Emoji)" }, h("input", { value: icon, onChange: (e) => setIcon(e.target.value), style: { ...st.input, fontSize: 22, textAlign: "center" }, maxLength: 2 })),
    h(Field, { label: "Farbe" },
      h("div", { style: { display: "flex", flexWrap: "wrap", gap: 8 } },
        colors.map((col) =>
          h("button", { key: col, onClick: () => setColor(col), style: { width: 34, height: 34, borderRadius: 10, background: col, border: color === col ? `2.5px solid ${c.ink}` : "none" } })
        )
      )
    ),
    h(Field, { label: "Monatsbudget (optional)" },
      h("input", { inputMode: "decimal", value: budget, onChange: (e) => setBudget(e.target.value), style: st.input, placeholder: "0,00 €" })
    ),
    h("button", { onClick: () => {
      if (!name.trim()) return;
      onSave({ name: name.trim(), icon: icon || "•", color }, parseFloat(budget.replace(",", ".")) || 0);
    }, style: st.primaryBtn }, "Speichern")
  );
}

function UserEditor({ users, setUsers, showToast }) {
  const [draft, setDraft] = useState(users);
  return h("div", null,
    h("div", { style: { fontSize: 15, color: c.inkSoft, marginBottom: 14, lineHeight: 1.6, fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif" } },
      "Namen anpassen. Bestehende Einträge werden nicht automatisch umbenannt."
    ),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
      draft.map((name, i) =>
        h(Field, { key: i, label: `Person ${i + 1}` },
          h("input", { value: name, onChange: (e) => { const x = [...draft]; x[i] = e.target.value; setDraft(x); }, style: st.input })
        )
      )
    ),
    h("button", { onClick: async () => {
      const cl = draft.map((d) => d.trim()).filter(Boolean);
      if (cl.length === 2) { await setUsers(cl); showToast("Aktualisiert", "success"); }
    }, style: { ...st.primaryBtn, marginTop: 14 } }, "Speichern")
  );
}

  return h("div", { style: { marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 } },
    h("div", { style: { minWidth: 0 } },
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 500, color: c.ink, letterSpacing: -0.7, lineHeight: 1.05 } }, title),

    ),

  );
}

function Modal({ title, onClose, children }) {
  return h("div", { style: st.modalBg, onClick: onClose },
    h("div", { style: st.modalCard, onClick: (e) => e.stopPropagation(), className: "slideUp" },
      h("div", { style: { width: 32, height: 3, background: c.borderStrong, borderRadius: 2, margin: "0 auto 18px" } }),
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 } },
        h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 500, color: c.ink, letterSpacing: -0.5 } }, title),
        h("button", { onClick: onClose, style: st.iconBtn, "aria-label": "Schließen" }, I.X({ size: 16, color: c.inkSoft }))
      ),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } }, children)
    )
  );
}

function Field({ label, children }) {
  return h("div", null,
    h("div", { style: { ...st.eyebrow, marginBottom: 7 } }, label),
    children
  );
}

function FAB({ onClick }) {
  return h("button", { onClick, style: st.fab, "aria-label": "Hinzufügen" },
    I.Plus({ size: 22, color: c.surface, strokeWidth: 2 })

}

function BottomNav({ tab, setTab }) {
  const items = [
    { id: "home", label: "Start", icon: I.Home },
    { id: "calendar", label: "Kalender", icon: I.Calendar },
    { id: "tasks", label: "Tasks", icon: I.ListChecks },
    { id: "notes", label: "Notizen", icon: I.NoteBook },
    { id: "expenses", label: "Geld", icon: I.Receipt },
  ];
  return h("div", { style: st.bottomNav },
    items.map((i) => {
      const active = tab === i.id;
      return h("button", { key: i.id, onClick: () => setTab(i.id),
        style: { ...st.navBtn, color: active ? c.ink : c.inkFaint }
      },
        i.icon({ size: 19, strokeWidth: active ? 2 : 1.5, color: active ? c.ink : c.inkFaint }),
        h("span", { style: { fontSize: 10, marginTop: 4, fontWeight: active ? 500 : 400, letterSpacing: 0.3 } }, i.label),
        active && h("div", { style: { position: "absolute", top: -1, width: 18, height: 2, background: c.accent, borderRadius: 999 } })
      );
    })
  );
}

function Toast({ msg, kind }) {
  const bg = kind === "success" ? c.success : kind === "error" ? c.warn : c.ink;
  return h("div", {
    style: {
      position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)",
      background: bg, color: c.surface, padding: "10px 18px", borderRadius: 999,
      fontSize: 13, fontWeight: 500, zIndex: 100,
      boxShadow: "0 8px 24px rgba(0,0,0,0.18)",
      animation: "toastIn 0.25s ease-out", maxWidth: "85%"
    }
  }, msg);
}
