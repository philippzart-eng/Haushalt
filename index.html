// Firestore wird so strukturiert:
// households/{HOUSEHOLD_ID}/data/{docKey}  → ein Dokument pro Datentyp
const dataDoc = (key) => db.collection("households").doc(HOUSEHOLD_ID).collection("data").doc(key);

const cloudGet = (key, fallback, onUpdate) => {
  return dataDoc(key).onSnapshot((snap) => {
    if (snap.exists) onUpdate(snap.data().value ?? fallback);
    else onUpdate(fallback);
  }, (err) => {
    console.error("Firestore error", key, err);
  });
};

const cloudSet = async (key, value) => {
  try {
    await dataDoc(key).set({ value, updatedAt: Date.now() });
  } catch (e) {
    console.error("cloudSet error", key, e);
  }
};

function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem("hh_authed") === "1");
  const [loading, setLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(() => localStorage.getItem("hh_user") || null);
  const [tab, setTab] = useState("home");

  // PIN: wird unabhängig vom Login geladen
  const [pin, setPin] = useState(DEFAULT_PIN);
  const [pinLoaded, setPinLoaded] = useState(false);

  // State
  const [users, setUsers] = useState(["Bob", "Anna"]);
  const [expenses, setExpenses] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [shopping, setShopping] = useState([]);
  const [categories, setCategories] = useState(CATEGORY_DEFAULTS);
  const [budgets, setBudgets] = useState({});
  const [recurring, setRecurring] = useState([]);
  const [settlements, setSettlements] = useState([]);
  const [events, setEvents] = useState([]);
  const [folders, setFolders] = useState([]);
  const [notes, setNotes] = useState([]);
  const [shopStores, setShopStores] = useState(SHOP_STORE_DEFAULTS);

  const [toast, setToast] = useState(null);
  const showToast = (msg, kind = "info") => {
    setToast({ msg, kind, id: uid() });
    setTimeout(() => setToast(null), 2200);
  };

  // PIN aus Firestore laden (vor Login möglich, da Regeln offen sind)
  useEffect(() => {
    const unsub = cloudGet("pin", DEFAULT_PIN, (val) => {
      setPin(val || DEFAULT_PIN);
      setPinLoaded(true);
    });
    return () => unsub && unsub();
  }, []);

  // Firestore live-listeners
  useEffect(() => {
    if (!authed) return;
    const unsubs = [
      cloudGet("users", ["Bob", "Anna"], setUsers),
      cloudGet("expenses", [], (v) => setExpenses(migrateExpenses(v))),
      cloudGet("tasks", [], (v) => setTasks(migrateTasks(v))),
      cloudGet("shopping", [], setShopping),
      cloudGet("categories", CATEGORY_DEFAULTS, setCategories),
      cloudGet("budgets", {}, setBudgets),
      cloudGet("recurring", [], setRecurring),
      cloudGet("settlements", [], setSettlements),
      cloudGet("events", [], setEvents),
      cloudGet("folders", [], setFolders),
      cloudGet("notes", [], setNotes),
      cloudGet("shopStores", SHOP_STORE_DEFAULTS, setShopStores),
    ];
    setLoading(false);
    return () => unsubs.forEach((u) => u && u());
  }, [authed]);

  // Recurring tasks/expenses ausführen (einmal beim Start)
  const ranRecurringRef = useRef(false);
  useEffect(() => {
    if (loading || ranRecurringRef.current || !authed) return;
    if (recurring.length === 0 && tasks.length === 0) return;
    ranRecurringRef.current = true;
    runRecurring(recurring, expenses).then((added) => {
      if (added.length > 0) {
        const updated = [...expenses, ...added];
        cloudSet("expenses", updated);
        // recurring lastGenerated updaten
        const updatedRec = recurring.map((r) => {
          if (!r.active) return r;
          const mine = added.filter((n) => n.recurringSource === r.id);
          if (mine.length === 0) return r;
          return { ...r, lastGenerated: mine[mine.length - 1].date };
        });
        cloudSet("recurring", updatedRec);
        const total = added.reduce((s, e) => s + e.amount, 0);
        showToast(`${added.length} Fixkosten gebucht · ${fmtEURc(total)}`, "success");
      }
    });
    rotateRecurringTasks(tasks, users).then((changed) => {
      if (changed) cloudSet("tasks", changed);
    });
  }, [loading, authed, recurring, tasks, users, expenses]);

  const p = {
    expenses: (n) => cloudSet("expenses", n),
    tasks: (n) => cloudSet("tasks", n),
    shopping: (n) => cloudSet("shopping", n),
    categories: (n) => cloudSet("categories", n),
    budgets: (n) => cloudSet("budgets", n),
    recurring: (n) => cloudSet("recurring", n),
    settlements: (n) => cloudSet("settlements", n),
    users: (n) => cloudSet("users", n),
    events: (n) => cloudSet("events", n),
    folders: (n) => cloudSet("folders", n),
    notes: (n) => cloudSet("notes", n),
    shopStores: (n) => cloudSet("shopStores", n),
    pin: (n) => cloudSet("pin", n),
  };

  const pickUser = (name) => {
    setCurrentUser(name);
    if (name) localStorage.setItem("hh_user", name);
    else localStorage.removeItem("hh_user");
  };

  // PIN-Screen — wartet bis PIN aus Firestore geladen ist
  if (!authed) {
    if (!pinLoaded) {
      return h("div", { style: { ...st.app, alignItems: "center", justifyContent: "center" } },
        h("div", { style: { textAlign: "center" } },
          h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 36, color: c.forest, fontWeight: 500, letterSpacing: -0.5, fontStyle: "italic" } }, "Haushalt"),
          h("div", { style: { marginTop: 6, fontSize: 12, color: c.inkSoft, letterSpacing: 2, textTransform: "uppercase" } }, "Lädt")
        )
      );
    }
    return h(PinScreen, { correctPin: pin, onSuccess: () => { sessionStorage.setItem("hh_authed", "1"); setAuthed(true); } });
  }

  if (loading) {
    return h("div", { style: { ...st.app, alignItems: "center", justifyContent: "center" } },
      h("div", { style: { textAlign: "center" } },
        h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 36, color: c.forest, fontWeight: 500, letterSpacing: -0.5, fontStyle: "italic" } }, "Haushalt"),
        h("div", { style: { marginTop: 6, fontSize: 12, color: c.inkSoft, letterSpacing: 2, textTransform: "uppercase" } }, "Verbindet…")
      )
    );
  }

  if (!currentUser) {
    return h(Login, { users, setUsers: p.users, onPick: pickUser });
  }

  const ctx = {
    currentUser, users, expenses, tasks, shopping, categories, budgets, recurring, settlements,
    events, folders, notes, pin, shopStores,
    p, showToast, setTab,
  };

  return h("div", { style: st.app },
    h(Header, { currentUser, onSwitch: () => pickUser(null), setTab, onLogout: () => { sessionStorage.removeItem("hh_authed"); setAuthed(false); } }),
    h("div", { style: st.content },
      tab === "home" && h(Dashboard, { ctx }),
      tab === "expenses" && h(Expenses, { ctx }),
      tab === "tasks" && h(Tasks, { ctx }),
      tab === "shopping" && h(Shopping, { ctx }),
      tab === "calendar" && h(CalendarView, { ctx }),
      tab === "notes" && h(Notes, { ctx }),
      tab === "stats" && h(Stats, { ctx }),
      tab === "settings" && h(SettingsView, { ctx })
    ),
    h(BottomNav, { tab, setTab }),
    toast && h(Toast, toast)
  );
}

// ============================================================
function PinScreen({ correctPin, onSuccess }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);

  const submit = (val) => {
    if (val === correctPin) {
      setError(false);
      onSuccess();
    } else {
      setError(true);
      setTimeout(() => { setPin(""); setError(false); }, 800);
    }
  };

  const handleDigit = (d) => {
    if (pin.length >= 6) return;
    const next = pin + d;
    setPin(next);
    if (next.length === correctPin.length) submit(next);
  };

  return h("div", { style: { ...st.app, alignItems: "center", justifyContent: "center", padding: 28 }, className: "fadeIn" },
    h("div", { style: { width: "100%", maxWidth: 320, textAlign: "center" } },
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 14, color: c.inkSoft, letterSpacing: 4, textTransform: "uppercase", marginBottom: 12 } }, "Willkommen"),
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 48, fontWeight: 500, color: c.ink, letterSpacing: -1.2, lineHeight: 0.95, fontStyle: "italic" } }, "Haushalt"),
      h("div", { style: { marginTop: 32, marginBottom: 24, display: "flex", justifyContent: "center", gap: 12 } },
        Array.from({ length: correctPin.length }).map((_, i) =>
          h("div", { key: i, style: {
            width: 14, height: 14, borderRadius: "50%",
            background: pin.length > i ? (error ? c.warn : c.ink) : "transparent",
            border: `1.5px solid ${error ? c.warn : pin.length > i ? c.ink : c.borderStrong}`,
            transition: "all 0.15s"
          }})
        )
      ),
      h("div", { style: { fontSize: 12, color: error ? c.warn : c.inkSoft, marginBottom: 24, minHeight: 16 } },
        error ? "Falscher PIN" : "PIN eingeben"
      ),
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, maxWidth: 280, margin: "0 auto" } },
        [1, 2, 3, 4, 5, 6, 7, 8, 9].map((d) =>
          h("button", { key: d, onClick: () => handleDigit(String(d)), style: st.pinBtn }, d)
        ),
        h("div"),
        h("button", { onClick: () => handleDigit("0"), style: st.pinBtn }, "0"),
        h("button", { onClick: () => setPin(pin.slice(0, -1)), style: { ...st.pinBtn, fontSize: 18 } }, "←")
      )
    )
  );
}

function migrateExpenses(list) {
  return (list || []).map((e) => ({ splitType: "equal", splitRatio: null, notes: "", ...e }));
}
function migrateTasks(list) {
  return (list || []).map((t) => ({ history: [], priority: "normal", rotate: false, rotationIndex: 0, nextDueDate: null, ...t }));
}

// Berechnet wann eine wiederkehrende Aufgabe wieder aktiv wird
function calcNextDue(recurring, fromDate) {
  if (!recurring) return null;
  const d = new Date(fromDate);
  if (recurring === "daily") d.setDate(d.getDate() + 1);
  else if (recurring === "weekly") d.setDate(d.getDate() + 7);
  else if (recurring === "biweekly") d.setDate(d.getDate() + 14);
  else if (recurring === "monthly") d.setMonth(d.getMonth() + 1);
  else return null;
  return d.toISOString().slice(0, 10);
}

// Liefert alle Tage zurück, die ein Event abdeckt (für mehrtägige Termine)
function eventDates(event) {
  if (!event.endDate || event.endDate <= event.date) return [event.date];
  const dates = [];
  let d = new Date(event.date);
  const end = new Date(event.endDate);
  while (d <= end) {
    dates.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

// Prüft ob ein Event an einem bestimmten Datum stattfindet
function eventOnDate(event, dateStr) {
  if (!event.endDate) return event.date === dateStr;
  return dateStr >= event.date && dateStr <= event.endDate;
}

function expandEvents(events, rangeStart, rangeEnd) {
  const result = [];
  for (const e of events) {
    if (!e.recurring) {
      const eEnd = e.endDate || e.date;
      if (e.date <= rangeEnd && eEnd >= rangeStart) result.push(e);
      continue;
    }
    // Wiederkehrend: alle Instanzen im Range generieren
    const duration = e.endDate ? daysBetween(e.date, e.endDate) : 0;
    let cursor = new Date(e.date);
    let safety = 0;
    while (safety++ < 3000) {
      const instStart = cursor.toISOString().slice(0, 10);
      const instEndDate = new Date(cursor);
      instEndDate.setDate(instEndDate.getDate() + duration);
      const instEnd = instEndDate.toISOString().slice(0, 10);
      // Stop-Bedingungen
      if (instStart > rangeEnd) break;
      if (e.recurringUntil && instStart > e.recurringUntil) break;
      // In Range? Hinzufügen
      if (instEnd >= rangeStart) {
        result.push({
          ...e,
          date: instStart,
          endDate: duration > 0 ? instEnd : null,
          _isRecurringInstance: instStart !== e.date,
        });
      }
      // Nächster Cursor
      if (e.recurring === "daily") cursor.setDate(cursor.getDate() + 1);
      else if (e.recurring === "weekly") cursor.setDate(cursor.getDate() + 7);
      else if (e.recurring === "biweekly") cursor.setDate(cursor.getDate() + 14);
      else if (e.recurring === "monthly") cursor.setMonth(cursor.getMonth() + 1);
      else if (e.recurring === "yearly") cursor.setFullYear(cursor.getFullYear() + 1);
      else break;
    }
  }
  return result;
}

function eventRecurringLabel(r) {
  return { daily: "täglich", weekly: "wöchentlich", biweekly: "alle 2 Wochen", monthly: "monatlich", yearly: "jährlich" }[r] || "";
}

// ============================================================
// LOGIC: Recurring Expenses
// ============================================================
async function runRecurring(recurringList, currentExpenses) {
  const newOnes = [];
  const now = new Date();
  recurringList.forEach((r) => {
    if (!r.active) return;
    let cursor = r.lastGenerated ? new Date(r.lastGenerated) : new Date(r.startDate);
    while (true) {
      const next = new Date(cursor);
      if (r.frequency === "monthly") next.setMonth(next.getMonth() + 1);
      else if (r.frequency === "weekly") next.setDate(next.getDate() + 7);
      else break;
      if (next > now) break;
      newOnes.push({
        id: uid(),
        amount: r.amount,
        category: r.category,
        description: r.description,
        date: next.toISOString().slice(0, 10),
        paidBy: r.paidBy,
        scope: r.scope || "shared",
        splitType: r.splitType || "equal",
        splitRatio: r.splitRatio || null,
        notes: "Automatisch erzeugt",
        recurringSource: r.id,
      });
      cursor = next;
    }
  });
  return newOnes;
}

async function rotateRecurringTasks(tasks, users) {
  let changed = false;
  const t = today();
  const next = tasks.map((task) => {
    if (!task.recurring || !task.completed) return task;
    // Reaktivieren wenn nextDueDate erreicht
    if (task.nextDueDate && task.nextDueDate <= t) {
      changed = true;
      const updated = { ...task, completed: false, nextDueDate: null };
      // Rotation: nächste Person zuweisen
      if (task.rotate && users.length >= 2) {
        const currentIdx = users.indexOf(task.assignedTo);
        const nextIdx = (currentIdx + 1) % users.length;
        updated.assignedTo = users[nextIdx];
        updated.rotationIndex = (task.rotationIndex || 0) + 1;
      }
      // dueDate auf nextDueDate setzen, falls die Aufgabe ursprünglich ein dueDate hatte
      if (task.dueDate) updated.dueDate = task.nextDueDate;
      return updated;
    }
    return task;
  });
  return changed ? next : null;
}

// ============================================================
// LOGIC: Balance
// ============================================================
function computeBalance(expenses, settlements, currentUser, other) {
  let amount = 0;
  expenses.filter((e) => e.scope === "shared").forEach((e) => {
    const shares = getSplit(e, currentUser, other);
    if (e.paidBy === currentUser) amount += shares.other;
    else if (e.paidBy === other) amount -= shares.current;
  });
  settlements.forEach((s) => {
    if (s.from === other && s.to === currentUser) amount -= s.amount;
    else if (s.from === currentUser && s.to === other) amount += s.amount;
  });
  return { amount };
}

function getSplit(expense, currentUser, other) {
  if (expense.splitType === "full_payer") return { current: 0, other: 0 };
  if (expense.splitType === "custom" && expense.splitRatio) {
    const r = expense.splitRatio;
    return {
      current: (expense.amount * (r[currentUser] || 0)) / 100,
      other: (expense.amount * (r[other] || 0)) / 100,
    };
  }
  return { current: expense.amount / 2, other: expense.amount / 2 };
}

// DASHBOARD
// ============================================================
function Dashboard({ ctx }) {
  const { currentUser, users, expenses, tasks, shopping, budgets, settlements, events, p, setTab, showToast } = ctx;
  const other = users.find((u) => u !== currentUser);
  const balance = useMemo(() => computeBalance(expenses, settlements, currentUser, other), [expenses, settlements, currentUser, other]);

  const myTasks = tasks.filter((t) => !t.completed && (t.assignedTo === currentUser || t.assignedTo === "Beide"));
  const overdueTasks = myTasks.filter((t) => t.dueDate && t.dueDate < today());
  const todayTasks = myTasks.filter((t) => t.dueDate === today());
  const shopOpen = shopping.filter((s) => !s.bought).length;
  const shopUrgent = shopping.filter((s) => !s.bought && s.urgent).length;

  // Anstehende Termine: laufende mehrtägige + heute + nächste 7 Tage, die mich betreffen
  const upcomingEvents = useMemo(() => {
    const t = today();
    const end = new Date(); end.setDate(end.getDate() + 7);
    const endStr = end.toISOString().slice(0, 10);
    return expandEvents(events, t, endStr)
      .filter((e) => e.who === "shared" || e.who === currentUser)
      .sort((a, b) => {
        // laufende mehrtägige zuerst, dann nach Datum
        const aOngoing = a.endDate && a.date <= t ? 0 : 1;
        const bOngoing = b.endDate && b.date <= t ? 0 : 1;
        if (aOngoing !== bOngoing) return aOngoing - bOngoing;
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return (a.time || "").localeCompare(b.time || "");
      })
      .slice(0, 4);
  }, [events, currentUser]);

  const month = today().slice(0, 7);
  const monthSpend = expenses.filter((e) => e.scope === "shared" && e.date.startsWith(month)).reduce((s, e) => s + e.amount, 0);
  const totalBudget = Object.values(budgets).reduce((s, v) => s + (v || 0), 0);
  const budgetPct = totalBudget > 0 ? (monthSpend / totalBudget) * 100 : 0;

  const streak = useMemo(() => {
    const dates = new Set();
    tasks.forEach((t) => t.history?.forEach((h) => dates.add(h.date)));
    let count = 0;
    let d = new Date();
    while (dates.has(d.toISOString().slice(0, 10))) { count++; d.setDate(d.getDate() - 1); }
    return count;
  }, [tasks]);

  const [showSettle, setShowSettle] = useState(false);

  const quickComplete = async (id) => {
    const next = tasks.map((t) => {
      if (t.id !== id) return t;
      const history = [...(t.history || []), { date: today(), by: currentUser }];
      return { ...t, completed: true, lastCompleted: today(), history };
    });
    await p.tasks(next);
    showToast("Erledigt", "success");
  };

  return h("div", { style: { display: "flex", flexDirection: "column", gap: 22, paddingBottom: 24 }, className: "fadeIn" },
    h("div", null,
      h("div", { style: st.eyebrow }, fmtDateLong(today())),
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 34, fontWeight: 500, color: c.ink, letterSpacing: -0.8, marginTop: 4, lineHeight: 1.05 } },
        "Hallo, ", h("span", { style: { fontStyle: "italic" } }, currentUser)
      )
    ),

    // Balance card
    h("div", { style: { ...st.cardLg, background: c.forest, color: c.surface, position: "relative", overflow: "hidden" } },
      h("div", { style: { position: "absolute", top: -50, right: -50, width: 180, height: 180, borderRadius: "50%", background: "rgba(255,255,255,0.04)" } }),
      h("div", { style: { position: "relative" } },
        h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
          h("div", { style: { ...st.eyebrow, color: "rgba(255,255,255,0.55)" } }, "Schuldenausgleich"),
          Math.abs(balance.amount) >= 0.01 && h("button", { onClick: () => setShowSettle(true), style: st.pillBtn }, "Ausgleichen")
        ),
        h("div", { style: { marginTop: 16 } },
          Math.abs(balance.amount) < 0.01
            ? h(React.Fragment, null,
                h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 30, fontWeight: 500, fontStyle: "italic" } }, "Alles ausgeglichen"),
                h("div", { style: { fontSize: 12, opacity: 0.55, marginTop: 6 } }, "Keine offenen Beträge")
              )
            : balance.amount > 0
              ? h(React.Fragment, null,
                  h("div", { style: { fontSize: 13, opacity: 0.7 } }, `${other} schuldet dir`),
                  h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 42, fontWeight: 500, marginTop: 4, letterSpacing: -1, color: c.rose } }, fmtEUR(balance.amount))
                )
              : h(React.Fragment, null,
                  h("div", { style: { fontSize: 13, opacity: 0.7 } }, `Du schuldest ${other}`),
                  h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 42, fontWeight: 500, marginTop: 4, letterSpacing: -1, color: c.ochre } }, fmtEUR(Math.abs(balance.amount)))
                )
        )
      )
    ),

    // Budget
    totalBudget > 0 && h("div", { style: st.card },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 } },
        h("div", null,
          h("div", { style: st.eyebrow }, `Monatsbudget · ${monthShort(month)}`),
          h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 500, color: c.ink, marginTop: 4, letterSpacing: -0.5 } },
            fmtEUR(monthSpend),
            h("span", { style: { fontSize: 14, color: c.inkSoft, fontWeight: 400, fontFamily: "Inter, sans-serif", marginLeft: 4 } }, ` / ${fmtEURc(totalBudget)}`)
          )
        ),
        h("div", { style: { fontSize: 12, color: budgetPct > 100 ? c.warn : budgetPct > 80 ? c.ochre : c.success, fontWeight: 500 } }, `${Math.round(budgetPct)}%`)
      ),
      h("div", { style: st.progressTrack },
        h("div", { style: { ...st.progressFill, width: `${Math.min(100, budgetPct)}%`, background: budgetPct > 100 ? c.warn : budgetPct > 80 ? c.ochre : c.success } })
      )
    ),

    // Quick stats
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
      h(MiniStat, { label: "Offene Aufgaben", value: myTasks.length, subValue: overdueTasks.length > 0 ? `${overdueTasks.length} überfällig` : null, accent: overdueTasks.length > 0 ? c.warn : null, onClick: () => setTab("tasks") }),
      h(MiniStat, { label: "Einkaufsliste", value: shopOpen, subValue: shopUrgent > 0 ? `${shopUrgent} dringend` : null, accent: shopUrgent > 0 ? c.warn : null, onClick: () => setTab("shopping") })
    ),

    upcomingEvents.length > 0 && h(Section, { title: "Anstehende Termine", action: () => setTab("calendar") },
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        upcomingEvents.map((e) => {
          const color = eventColor(e, currentUser);
          const t = today();
          const isToday = e.date === t;
          const isMultiDay = !!e.endDate;
          const isOngoing = isMultiDay && e.date <= t && e.endDate >= t;

          let dateLabel;
          if (isMultiDay) {
            if (isOngoing) {
              const dayNum = daysBetween(e.date, t) + 1;
              const totalDays = daysBetween(e.date, e.endDate) + 1;
              dateLabel = h("span", { style: { color: c.accent, fontWeight: 500 } }, `Läuft · Tag ${dayNum}/${totalDays}`);
            } else {
              dateLabel = h("span", null, `Ab ${fmtDate(e.date, { weekday: "short", day: "numeric", month: "short" })} · ${daysBetween(e.date, e.endDate) + 1} Tage`);
            }
          } else if (isToday) {
            dateLabel = h("span", { style: { color: c.accent, fontWeight: 500 } }, "Heute");
          } else {
            dateLabel = h("span", null, fmtDate(e.date, { weekday: "short", day: "numeric", month: "short" }));
          }

          return h("div", { key: e.id, style: { ...st.row, padding: "12px 14px" } },
            h("div", { style: { width: 4, alignSelf: "stretch", background: color, borderRadius: 2, marginRight: 12 } }),
            h("div", { style: { flex: 1, minWidth: 0 } },
              h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, e.title),
              h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginTop: 2, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" } },
                dateLabel,
                e.time && !isMultiDay && h("span", null, ` · ${e.time}`),
                h("span", null, ` · ${e.who === "shared" ? "Gemeinsam" : e.who}`)
              )
            )
          );
        })
      )
    ),

    streak >= 3 && h("div", { style: { ...st.card, display: "flex", alignItems: "center", gap: 14, padding: "14px 18px" } },
      I.Flame({ size: 22, color: c.ochre }),
      h("div", { style: { flex: 1 } },
        h("div", { style: { fontSize: 17, fontWeight: 500, color: c.ink, fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic" } }, `${streak} Tage Serie`),
        h("div", { style: { fontSize: 12, color: c.inkSoft, marginTop: 1 } }, "Jeden Tag mind. eine Aufgabe erledigt")
      )
    ),

    (todayTasks.length > 0 || overdueTasks.length > 0) && h(Section, { title: overdueTasks.length > 0 ? "Heute & überfällig" : "Heute fällig" },
      h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
        [...overdueTasks, ...todayTasks].slice(0, 4).map((t) => {
          const overdue = t.dueDate < today();
          return h("div", { key: t.id, style: { ...st.row, padding: "12px 14px", borderColor: overdue ? c.warn + "40" : c.border } },
            h("button", { onClick: () => quickComplete(t.id), style: st.checkbox, "aria-label": "Schnell erledigen" }),
            h("div", { style: { flex: 1, marginLeft: 10, minWidth: 0 } },
              h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, t.title),
              h("div", { style: { fontSize: 11.5, color: overdue ? c.warn : c.inkSoft, marginTop: 2, display: "flex", alignItems: "center", gap: 6 } },
                t.recurring && I.Repeat({ size: 10 }),
                `${t.assignedTo} ${overdue ? `· überfällig seit ${fmtDate(t.dueDate)}` : "· heute"}`
              )
            ),
            t.priority === "high" && I.Star({ size: 13, color: c.accent })
          );
        })
      )
    ),

    h(Section, { title: "Aufgaben", action: () => setTab("tasks") },
      myTasks.length === 0
        ? h(Empty, { text: "Alles erledigt — schön! 🌿" })
        : h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
            myTasks.filter((t) => t.dueDate !== today() && (!t.dueDate || t.dueDate > today())).slice(0, 3).map((t) =>
              h("div", { key: t.id, style: { ...st.row, padding: "12px 14px" } },
                h("button", { onClick: () => quickComplete(t.id), style: st.checkbox, "aria-label": "Erledigen" }),
                h("div", { style: { flex: 1, marginLeft: 10, minWidth: 0 } },
                  h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, t.title),
                  h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginTop: 2, display: "flex", alignItems: "center", gap: 6 } },
                    t.recurring && I.Repeat({ size: 10 }),
                    t.rotate && I.Rotate({ size: 10 }),
                    `${t.assignedTo}${t.dueDate ? ` · bis ${fmtDate(t.dueDate)}` : ""}`
                  )
                ),
                t.priority === "high" && I.Star({ size: 13, color: c.accent })
              )

    showSettle && h(SettlementModal, {
      balance: balance.amount,
      currentUser,
      other,
      onClose: () => setShowSettle(false),
      onConfirm: async (amount) => {
        const from = balance.amount > 0 ? other : currentUser;
        const to = balance.amount > 0 ? currentUser : other;
        await p.settlements([...settlements, { id: uid(), date: today(), from, to, amount: Math.abs(amount), recordedBy: currentUser }]);
        setShowSettle(false);
        showToast(`Ausgleich über ${fmtEUR(amount)} verbucht`, "success");
      }
    })
  );
}

  const to = balance > 0 ? currentUser : other;
  return h(Modal, { onClose, title: "Ausgleich verbuchen" },
    h("div", { style: { ...st.card, padding: 18, background: c.surfaceAlt, border: "none" } },
      h("div", { style: { fontSize: 12, color: c.inkSoft, marginBottom: 8 } },
        h("strong", { style: { color: c.ink, fontWeight: 500 } }, from),
        " zahlt ",
        h("strong", { style: { color: c.ink, fontWeight: 500 } }, to)
      ),
      h("div", { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 500, color: c.accent, letterSpacing: -0.5 } },

// ============================================================
// EXPENSES
// ============================================================
function Expenses({ ctx }) {
  const { currentUser, users, expenses, categories, recurring, p, showToast } = ctx;
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("shared");
  const [search, setSearch] = useState("");
  const [showFilters, setShowFilters] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [monthFilter, setMonthFilter] = useState("");
  const [showRec, setShowRec] = useState(false);

  const filtered = useMemo(() => {
    return expenses
      .filter((e) => {
        if (filter === "all") return true;
        if (filter === "shared") return e.scope === "shared";
        return e.scope === "personal" && e.paidBy === currentUser;
      })
      .filter((e) => {
        if (categoryFilter && e.category !== categoryFilter) return false;
        if (monthFilter && !e.date.startsWith(monthFilter)) return false;
        if (search.trim()) {
          const q = search.toLowerCase();
          return (e.description || "").toLowerCase().includes(q) || e.category.toLowerCase().includes(q) || (e.notes || "").toLowerCase().includes(q);
        }
        return true;
      })
      .sort((a, b) => b.date.localeCompare(a.date));
  }, [expenses, filter, currentUser, categoryFilter, monthFilter, search]);

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach((e) => { const k = mKey(e.date); if (!map[k]) map[k] = []; map[k].push(e); });
    return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  const totalShown = filtered.reduce((s, e) => s + e.amount, 0);

  const remove = async (id) => {
    if (!confirm("Diese Ausgabe wirklich löschen?")) return;
    await p.expenses(expenses.filter((e) => e.id !== id));
    showToast("Gelöscht");
  };

  const upsert = async (item) => {
    if (editing) {
      await p.expenses(expenses.map((e) => e.id === item.id ? item : e));
      showToast("Aktualisiert");
    } else {
      await p.expenses([...expenses, item]);
      showToast("Ausgabe gespeichert", "success");
    }
    setShowForm(false);
    setEditing(null);
  };

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Ausgaben", subtitle: "Wer hat was bezahlt",
      right: h("button", { onClick: () => setShowRec(true), style: st.iconBtn, "aria-label": "Wiederkehrende" }, I.Repeat({ color: c.inkSoft, size: 15 }))
    }),

    h("div", { style: st.segmented },
      [{ v: "shared", l: "Geteilt" }, { v: "personal", l: "Persönlich" }, { v: "all", l: "Alle" }].map((o) =>
        h("button", { key: o.v, onClick: () => setFilter(o.v), style: { ...st.segmentedBtn, color: filter === o.v ? c.ink : c.inkSoft, background: filter === o.v ? c.surface : "transparent", fontWeight: filter === o.v ? 500 : 400 } }, o.l)
      )
    ),

    h("div", { style: { display: "flex", gap: 8, marginTop: 12 } },
      h("div", { style: { position: "relative", flex: 1 } },
        h("div", { style: { position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" } }, I.Search({ size: 14, color: c.inkFaint })),
        h("input", { value: search, onChange: (e) => setSearch(e.target.value), style: { ...st.input, paddingLeft: 34 }, placeholder: "Suchen…" })
      ),
      h("button", { onClick: () => setShowFilters(!showFilters), style: { ...st.iconBtn, background: (categoryFilter || monthFilter) ? c.ink : c.surface, borderColor: (categoryFilter || monthFilter) ? c.ink : c.border }, "aria-label": "Filter" },
        I.Filter({ size: 15, color: (categoryFilter || monthFilter) ? c.surface : c.inkSoft })
      )
    ),

    showFilters && h("div", { style: { ...st.card, padding: 14, marginTop: 8 } },
      h(Field, { label: "Kategorie" },
        h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6 } },
          h("button", { onClick: () => setCategoryFilter(null), style: { ...st.chip, ...(categoryFilter === null ? st.chipActive : {}) } }, "Alle"),
          categories.map((cat) =>
            h("button", { key: cat.name, onClick: () => setCategoryFilter(categoryFilter === cat.name ? null : cat.name),
              style: { ...st.chip, ...(categoryFilter === cat.name ? { background: cat.color, color: "#fff", borderColor: cat.color } : {}) } },
              h("span", { style: { marginRight: 4 } }, cat.icon), cat.name
            )
          )
        )
      ),
      h("div", { style: { marginTop: 12 } },
        h(Field, { label: "Monat" },
          h("input", { type: "month", value: monthFilter, onChange: (e) => setMonthFilter(e.target.value), style: st.input })
        )
      ),
      (categoryFilter || monthFilter) && h("button", { onClick: () => { setCategoryFilter(null); setMonthFilter(""); }, style: { ...st.textBtn, marginTop: 10 } }, "Filter zurücksetzen")
    ),

    filtered.length > 0 && h("div", { style: { marginTop: 14, fontSize: 11.5, color: c.inkSoft, padding: "0 4px", letterSpacing: 0.3 } },
      `${filtered.length} ${filtered.length === 1 ? "Eintrag" : "Einträge"} · ${fmtEUR(totalShown)}`
    ),

    filtered.length === 0
      ? h("div", { style: { marginTop: 12 } }, h(Empty, { text: "Keine Einträge" }))
      : h("div", { style: { marginTop: 10 } },
          grouped.map(([m, items]) =>
            h("div", { key: m, style: { marginBottom: 18 } },
              h("div", { style: { ...st.eyebrow, padding: "4px 4px 8px" } }, `${monthName(m)} · ${fmtEUR(items.reduce((s, i) => s + i.amount, 0))}`),
              h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                items.map((e) =>
                  h(ExpenseRow, { key: e.id, expense: e, categories, currentUser, onEdit: () => { setEditing(e); setShowForm(true); }, onDelete: () => remove(e.id) })
                )
              )
            )
          )
        ),

    h(FAB, { onClick: () => { setEditing(null); setShowForm(true); } }),
    showForm && h(ExpenseForm, { currentUser, users, categories, editing, onClose: () => { setShowForm(false); setEditing(null); }, onSave: upsert }),
    showRec && h(RecurringManager, { recurring, setRecurring: p.recurring, categories, users, currentUser, onClose: () => setShowRec(false), showToast })
  );
}

        h("span", { style: { fontWeight: 500, color: c.ink } }, meta.name),
        expense.scope === "personal" && " · persönlich"
      ),
      expense.paidBy === currentUser && h("div", { style: { display: "flex", gap: 8 } },
        h("button", { onClick: onEdit, style: st.smallBtn }, I.Edit({ size: 11 }), " Bearbeiten"),

      )
    )

function RecurringManager({ recurring, setRecurring, categories, users, currentUser, onClose, showToast }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);

  const upsert = async (item) => {
    if (editing) await setRecurring(recurring.map((r) => r.id === item.id ? item : r));
    else await setRecurring([...recurring, item]);
    setShowForm(false); setEditing(null);
    showToast("Vorlage gespeichert", "success");
  };

  const toggleActive = async (id) => {
    await setRecurring(recurring.map((r) => r.id === id ? { ...r, active: !r.active } : r));
  };

  const remove = async (id) => {
    if (!confirm("Vorlage löschen? Bereits erzeugte Einträge bleiben.")) return;
    await setRecurring(recurring.filter((r) => r.id !== id));
    showToast("Gelöscht");
  };

  return h(Modal, { onClose, title: "Wiederkehrend" },
    h("div", { style: { fontSize: 15, color: c.inkSoft, lineHeight: 1.6, fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic" } },
      "Werden automatisch jeden Monat oder jede Woche als neue Ausgabe erzeugt."
    ),
    recurring.length === 0
      ? h(Empty, { text: "Noch keine Vorlagen" })
      : h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          recurring.map((r) => {
            const meta = getCat(categories, r.category);
            return h("div", { key: r.id, style: { ...st.row, opacity: r.active ? 1 : 0.5, padding: "12px 14px" } },
              h("div", { style: { width: 34, height: 34, borderRadius: 9, background: `${meta.color}14`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, marginRight: 10, flexShrink: 0 } }, meta.icon),
              h("div", { style: { flex: 1, minWidth: 0 } },
                h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, r.description),
                h("div", { style: { fontSize: 11, color: c.inkSoft, marginTop: 2 } }, `${fmtEUR(r.amount)} · ${r.frequency === "monthly" ? "monatlich" : "wöchentlich"} · ${r.paidBy}`)
              ),
              h("button", { onClick: () => toggleActive(r.id), style: st.miniBtn },
                r.active ? I.Check({ size: 14, color: c.success, strokeWidth: 2 }) : I.X({ size: 14, color: c.inkFaint, strokeWidth: 2 })
              ),
              h("button", { onClick: () => { setEditing(r); setShowForm(true); }, style: st.miniBtn }, I.Edit({ size: 12, color: c.inkSoft })),
              h("button", { onClick: () => remove(r.id), style: st.miniBtn }, I.Trash({ size: 12, color: c.inkSoft }))
            );
          })
        ),
    h("button", { onClick: () => { setEditing(null); setShowForm(true); }, style: st.primaryBtn },
      I.Plus({ size: 15, strokeWidth: 2 }), " Vorlage hinzufügen"
    ),
    showForm && h(RecurringForm, { currentUser, users, categories, editing, onClose: () => { setShowForm(false); setEditing(null); }, onSave: upsert })
  );
}

      ),
      splitType === "custom" && h("div", { style: { marginTop: 10, padding: 12, background: c.surfaceAlt, borderRadius: 10 } },
        users.map((u, i) =>
          h("div", { key: u, style: { display: "flex", alignItems: "center", gap: 10, marginBottom: i === 0 ? 8 : 0 } },
            h("div", { style: { width: 60, fontSize: 13, color: c.ink, fontWeight: 500 } }, u),
            h("input", { type: "number", min: "0", max: "100", value: splitRatio[u] || 0,
              onChange: (e) => {
                const v = parseInt(e.target.value) || 0;
                const next = { ...splitRatio, [u]: v };
                const otherU = users.find((x) => x !== u);
                if (otherU) next[otherU] = Math.max(0, 100 - v);
                setSplitRatio(next);
              },
              style: { ...st.input, padding: "8px 10px", textAlign: "center", flex: 1 }
            }),
            h("div", { style: { fontSize: 13, color: c.inkSoft } }, "%")
          )
        )
      )
    ),
    h("button", { onClick: submit, style: st.primaryBtn }, "Speichern")
  );
}

// TASKS

function Tasks({ ctx }) {
  const { currentUser, users, tasks, p, showToast } = ctx;
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("open");
  const [assignFilter, setAssignFilter] = useState("all");

  const toggle = async (id) => {
    const task = tasks.find((t) => t.id === id);
    const next = tasks.map((t) => {
      if (t.id !== id) return t;
      const newCompleted = !t.completed;
      const history = [...(t.history || [])];
      if (newCompleted) history.push({ date: today(), by: currentUser });
      // Bei wiederkehrender Aufgabe: nächstes Fälligkeitsdatum berechnen
      const nextDueDate = newCompleted && t.recurring ? calcNextDue(t.recurring, today()) : null;
      return {
        ...t,
        completed: newCompleted,
        lastCompleted: newCompleted ? today() : t.lastCompleted,
        history,
        nextDueDate
      };
    });
    await p.tasks(next);
    if (task && !task.completed) {
      if (task.recurring) {
        const nextD = calcNextDue(task.recurring, today());
        showToast(`Erledigt — kommt am ${fmtDate(nextD)} wieder`, "success");
      } else {
        showToast(`"${task.title}" erledigt`, "success");
      }
    }
  };

  const remove = async (id) => {
    if (!confirm("Diese Aufgabe wirklich löschen?")) return;
    await p.tasks(tasks.filter((t) => t.id !== id));
    showToast("Gelöscht");
  };

  const upsert = async (t) => {
    if (editing) {
      await p.tasks(tasks.map((x) => x.id === t.id ? t : x));
      showToast("Aktualisiert");
    } else {
      await p.tasks([...tasks, t]);
      showToast("Aufgabe angelegt", "success");
    }
    setShowForm(false); setEditing(null);
  };

  const visible = useMemo(() => {
    return tasks
      .filter((t) => {
        if (filter === "all") return true;
        if (filter === "done") return t.completed;
        // "open": nicht-erledigte + erledigte wiederkehrende (die kommen ja zurück)
        return !t.completed || (t.recurring && t.nextDueDate);
      })
      .filter((t) => assignFilter === "all" || t.assignedTo === assignFilter || (assignFilter === currentUser && t.assignedTo === "Beide"))
      .sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        const pOrder = { high: 0, normal: 1, low: 2 };
        const pDiff = (pOrder[a.priority] ?? 1) - (pOrder[b.priority] ?? 1);
        if (pDiff !== 0 && !a.completed) return pDiff;
        const aD = a.dueDate || "9999"; const bD = b.dueDate || "9999";
        return aD.localeCompare(bD);
      });
  }, [tasks, filter, assignFilter, currentUser]);

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Aufgaben", subtitle: "Putzplan & To-Dos" }),
    h("div", { style: st.segmented },
      [{ v: "open", l: "Offen" }, { v: "done", l: "Erledigt" }, { v: "all", l: "Alle" }].map((o) =>
        h("button", { key: o.v, onClick: () => setFilter(o.v),
          style: { ...st.segmentedBtn, color: filter === o.v ? c.ink : c.inkSoft, background: filter === o.v ? c.surface : "transparent", fontWeight: filter === o.v ? 500 : 400 }
        }, o.l)
      )
    ),
    h("div", { style: { display: "flex", gap: 6, marginTop: 10, overflowX: "auto", paddingBottom: 2 } },
      h("button", { onClick: () => setAssignFilter("all"), style: { ...st.chip, flexShrink: 0, ...(assignFilter === "all" ? st.chipActive : {}) } }, "Alle"),
      users.map((u) =>
        h("button", { key: u, onClick: () => setAssignFilter(u), style: { ...st.chip, flexShrink: 0, ...(assignFilter === u ? st.chipActive : {}) } }, u)
      ),
      h("button", { onClick: () => setAssignFilter("Beide"), style: { ...st.chip, flexShrink: 0, ...(assignFilter === "Beide" ? st.chipActive : {}) } }, "Beide")
    ),
    visible.length === 0
      ? h("div", { style: { marginTop: 16 } }, h(Empty, { text: filter === "done" ? "Noch nichts erledigt" : "Alles geschafft ✿" }))
      : h("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginTop: 16 } },
          visible.map((t) =>
            h(SwipeRow, {
              key: t.id,
              onSwipeRight: () => toggle(t.id),
              onSwipeLeft: () => remove(t.id),
              rightLabel: t.completed ? "Zurück" : "✓ Erledigt",
              leftLabel: "Löschen",
              rightColor: c.success,
              leftColor: c.warn,
            },
              h(TaskRow, { task: t, onToggle: () => toggle(t.id), onEdit: () => { setEditing(t); setShowForm(true); }, onDelete: () => remove(t.id) })
            )
          )
        ),
    h(FAB, { onClick: () => { setEditing(null); setShowForm(true); } }),
    showForm && h(TaskForm, { users, currentUser, editing, onClose: () => { setShowForm(false); setEditing(null); }, onSave: upsert })
  );
}

// Wiederverwendbare Zeile mit Wisch-Geste:
// nach rechts wischen = primäre Aktion (z.B. erledigen), nach links = löschen
function SwipeRow({ children, onSwipeRight, onSwipeLeft, rightLabel, leftLabel, rightColor, leftColor, style }) {
  const [dx, setDx] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const startX = useRef(0);
  const startY = useRef(0);
  const locked = useRef(null); // "h" horizontal | "v" vertical

  const THRESHOLD = 70;

  const onStart = (clientX, clientY) => {
    startX.current = clientX;
    startY.current = clientY;
    locked.current = null;
    setSwiping(true);
  };
  const onMove = (clientX, clientY, e) => {
    if (!swiping) return;
    const diffX = clientX - startX.current;
    const diffY = clientY - startY.current;
    if (locked.current === null) {
      if (Math.abs(diffX) > 8 || Math.abs(diffY) > 8) {
        locked.current = Math.abs(diffX) > Math.abs(diffY) ? "h" : "v";
      }
    }
    if (locked.current === "h") {
      if (e && e.cancelable) e.preventDefault();
      // Nur erlaubte Richtungen zulassen
      let d = diffX;
      if (d > 0 && !onSwipeRight) d = 0;
      if (d < 0 && !onSwipeLeft) d = 0;
      setDx(Math.max(-140, Math.min(140, d)));
    }
  };
  const onEnd = () => {
    if (dx > THRESHOLD && onSwipeRight) onSwipeRight();
    else if (dx < -THRESHOLD && onSwipeLeft) onSwipeLeft();
    setDx(0);
    setSwiping(false);
    locked.current = null;
  };

  const revealRight = dx > 0; // wischt nach rechts → linke Aktionsfläche (primär) sichtbar
  const active = Math.abs(dx) > THRESHOLD;

  return h("div", { style: { position: "relative", borderRadius: 12, overflow: "hidden", ...style } },
    // Hintergrund-Aktionsflächen
    h("div", { style: {
      position: "absolute", inset: 0, display: "flex",
      alignItems: "center",
      justifyContent: revealRight ? "flex-start" : "flex-end",
      paddingLeft: 18, paddingRight: 18,
      background: revealRight ? (rightColor || c.success) : (leftColor || c.warn),
      color: "#fff", fontSize: 13, fontWeight: 600, letterSpacing: 0.3,
    }},
      h("span", { style: { opacity: active ? 1 : 0.6, transition: "opacity 0.1s" } },
        revealRight ? (rightLabel || "Erledigt") : (leftLabel || "Löschen")
      )
    ),
    // Vordergrund (eigentliche Zeile)
    h("div", {
      style: {
        transform: `translateX(${dx}px)`,
        transition: swiping ? "none" : "transform 0.22s cubic-bezier(0.2,0.8,0.2,1)",
        touchAction: "pan-y",
        position: "relative",
      },
      onTouchStart: (e) => onStart(e.touches[0].clientX, e.touches[0].clientY),
      onTouchMove: (e) => onMove(e.touches[0].clientX, e.touches[0].clientY, e),
      onTouchEnd: onEnd,
      onMouseDown: (e) => onStart(e.clientX, e.clientY),
      onMouseMove: (e) => swiping && onMove(e.clientX, e.clientY, e),
      onMouseUp: onEnd,
      onMouseLeave: () => swiping && onEnd(),
    }, children)
  );
}

function Shopping({ ctx }) {
  const { currentUser, shopping, shopStores, p, showToast } = ctx;
  const [input, setInput] = useState("");
  const [qty, setQty] = useState("");
  const [store, setStore] = useState(null); // gewählter Laden für neuen Artikel
  const [groupByStore, setGroupByStore] = useState(true);
  const [showStorePicker, setShowStorePicker] = useState(false);
  const [newStoreName, setNewStoreName] = useState("");

  // Liste der Läden (Fallback auf Defaults wenn noch nichts geladen)
  const stores = (shopStores && shopStores.length > 0) ? shopStores : SHOP_STORE_DEFAULTS;
  const findStore = (id) => stores.find((s) => s.id === id) || stores.find((s) => s.id === "sonstiges") || stores[stores.length - 1];
  // Aktuell gewählter Laden (Default: erster Laden)
  const activeStore = store || stores[0]?.id;

  const open = shopping.filter((s) => !s.bought);
  const bought = shopping.filter((s) => s.bought);

  const add = async () => {
    const v = input.trim();
    if (!v) return;
    await p.shopping([...shopping, { id: uid(), item: v, qty: qty.trim() || null, store: activeStore, addedBy: currentUser, bought: false, urgent: false, addedAt: today() }]);
    setInput(""); setQty("");
  };

  const toggle = async (id) => {
    const item = shopping.find((s) => s.id === id);
    await p.shopping(shopping.map((s) => s.id === id ? { ...s, bought: !s.bought, boughtBy: !s.bought ? currentUser : null, boughtAt: !s.bought ? today() : null } : s));
    if (item && !item.bought) showToast(`"${item.item}" gekauft`, "success");
  };

  const toggleUrgent = async (id) => {
    await p.shopping(shopping.map((s) => s.id === id ? { ...s, urgent: !s.urgent } : s));
  };

  const remove = async (id) => { await p.shopping(shopping.filter((s) => s.id !== id)); };

  const clearBought = async () => {
    if (!confirm("Gekaufte Artikel entfernen?")) return;
    await p.shopping(shopping.filter((s) => !s.bought));
    showToast("Aufgeräumt");
  };

  // Neuen Laden anlegen
  const addStore = async () => {
    const name = newStoreName.trim();
    if (!name) return;
    const id = "store_" + uid();
    const next = [...stores.filter((s) => s.id !== "sonstiges"), { id, name, icon: "🏬" }, ...stores.filter((s) => s.id === "sonstiges")];
    await p.shopStores(next);
    setStore(id);
    setNewStoreName("");
    showToast(`"${name}" hinzugefügt`, "success");
  };

  // Offene Items nach Laden gruppieren
  const grouped = useMemo(() => {
    const map = {};
    open.forEach((s) => {
      const sid = s.store || (stores[0]?.id);
      if (!map[sid]) map[sid] = [];
      map[sid].push(s);
    });
    // Reihenfolge: nach Position in stores-Liste
    return stores
      .map((st) => ({ store: st, items: (map[st.id] || []).sort((a, b) => (b.urgent ? 1 : 0) - (a.urgent ? 1 : 0)) }))
      .filter((g) => g.items.length > 0);
  }, [open, stores]);

  // Eine offene Zeile rendern (mit Wisch-Geste)
  const renderOpenRow = (s) => h(SwipeRow, {
    key: s.id,
    onSwipeRight: () => toggle(s.id),
    onSwipeLeft: () => remove(s.id),
    rightLabel: "✓ Gekauft",
    leftLabel: "Löschen",
    rightColor: c.success,
    leftColor: c.warn,
    style: { marginBottom: 6 },
  },
    h("div", { style: { ...st.row, padding: "10px 12px", borderColor: s.urgent ? c.warn + "40" : c.border, background: s.urgent ? c.warnBg : c.surface, borderRadius: 12 } },
      h("button", { onClick: () => toggle(s.id), style: st.checkbox, "aria-label": "Gekauft" }),
      h("div", { style: { flex: 1, marginLeft: 10, minWidth: 0 } },
        h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5, display: "flex", alignItems: "center", gap: 6 } },
          s.urgent && I.Alert({ size: 12, color: c.warn, strokeWidth: 2 }),
          h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, s.item),
          s.qty && h("span", { style: { fontSize: 12, color: c.inkSoft, fontWeight: 400, marginLeft: "auto", flexShrink: 0 } }, s.qty)
        ),
        h("div", { style: { fontSize: 11, color: c.inkFaint, marginTop: 1 } }, `von ${s.addedBy}`)
      ),
      h("button", { onClick: () => toggleUrgent(s.id), style: st.miniBtn, "aria-label": "Dringend" },
        I.Alert({ size: 13, color: s.urgent ? c.warn : c.inkFaint, strokeWidth: 2 })
      ),
      h("button", { onClick: () => remove(s.id), style: st.miniBtn, "aria-label": "Löschen" },
        I.X({ size: 13, color: c.inkFaint, strokeWidth: 2 })
      )
    )
  );

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Einkaufen", subtitle: "Was fehlt zuhause",
      right: open.length > 0 && h("button", { onClick: () => setGroupByStore(!groupByStore), style: st.iconBtn, "aria-label": "Sortierung" },
        groupByStore ? I.List({ color: c.inkSoft, size: 17 }) : I.Grid({ color: c.inkSoft, size: 17 })
      )
    }),
    // Eingabe
    h("div", { style: { display: "flex", gap: 8, marginBottom: 8 } },
      h("input", { value: input, onChange: (e) => setInput(e.target.value), onKeyDown: (e) => e.key === "Enter" && add(), style: { ...st.input, flex: 1 }, placeholder: "Artikel…" }),
      h("input", { value: qty, onChange: (e) => setQty(e.target.value), onKeyDown: (e) => e.key === "Enter" && add(), style: { ...st.input, width: 64, textAlign: "center" }, placeholder: "Menge" }),
      h("button", { onClick: add, style: { ...st.primaryBtn, padding: "0 16px", width: "auto", margin: 0, minHeight: 44, height: 44 } }, I.Plus({ size: 17, strokeWidth: 2, color: c.surface }))
    ),
    // Laden-Auswahl für neuen Artikel
    h("button", { onClick: () => setShowStorePicker(!showStorePicker),
      style: { ...st.row, padding: "8px 12px", marginBottom: showStorePicker ? 8 : 16, width: "100%", justifyContent: "space-between" }
    },
      h("span", { style: { fontSize: 13, color: c.inkSoft, display: "flex", alignItems: "center", gap: 8 } },
        h("span", { style: { fontSize: 15 } }, findStore(activeStore).icon),
        h("span", null, findStore(activeStore).name)
      ),
      h("span", { style: { fontSize: 11, color: c.inkFaint } }, "Laden wählen")
    ),
    showStorePicker && h("div", { style: { marginBottom: 16 } },
      h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 } },
        stores.map((sc) =>
          h("button", { key: sc.id, onClick: () => { setStore(sc.id); setShowStorePicker(false); },
            style: { ...st.chip, ...(activeStore === sc.id ? st.chipActive : {}), display: "flex", alignItems: "center", gap: 5 }
          }, h("span", null, sc.icon), h("span", null, sc.name))
        )
      ),
      // Neuer Laden anlegen
      h("div", { style: { display: "flex", gap: 8 } },
        h("input", { value: newStoreName, onChange: (e) => setNewStoreName(e.target.value),
          onKeyDown: (e) => e.key === "Enter" && addStore(),
          style: { ...st.input, flex: 1, fontSize: 13 }, placeholder: "Neuer Laden (z. B. Müller)…" }),

    open.length > 0 && (groupByStore

                h("span", { style: { fontSize: 15 } }, sc.icon),
                h("span", { style: { fontSize: 12.5, fontWeight: 600, color: c.inkSoft, letterSpacing: 0.2 } }, sc.name),

      "Tipp: nach rechts wischen = gekauft, nach links = löschen"

      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 24, marginBottom: 8 } },
        h("div", { style: st.eyebrow }, `Gekauft · ${bought.length}`),

function CalendarView({ ctx }) {
  const { currentUser, users, events, p, showToast } = ctx;
  const [view, setView] = useState("month"); // "month" | "agenda"
  const [cursor, setCursor] = useState(new Date()); // for month view
  const [selectedDate, setSelectedDate] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all"); // all | shared | currentUser

  const filtered = useMemo(() => {
    // Großzügiger Range: -60 Tage bis +2 Jahre — deckt Dashboard, Monatsansicht und Agenda ab
    const rs = new Date(); rs.setDate(rs.getDate() - 60);
    const re = new Date(); re.setFullYear(re.getFullYear() + 2);
    const rangeStart = rs.toISOString().slice(0, 10);
    const rangeEnd = re.toISOString().slice(0, 10);
    const expanded = expandEvents(events, rangeStart, rangeEnd);
    return expanded.filter((e) => {
      if (filter === "all") return true;
      if (filter === "shared") return e.who === "shared";
      return e.who === filter;
    });
  }, [events, filter]);

  // Hilfsfunktion: zum Bearbeiten/Löschen das Original-Event (nicht die Instanz) verwenden
  const findOriginal = (e) => events.find((x) => x.id === e.id) || e;

  const upsert = async (item) => {
    if (editing && editing.id && events.find((e) => e.id === editing.id)) {
      await p.events(events.map((e) => e.id === item.id ? item : e));
      showToast("Aktualisiert");
    } else {
      await p.events([...events, item]);
      showToast("Termin gespeichert", "success");
    }
    setShowForm(false); setEditing(null);
  };

  const remove = async (id) => {
    const ev = events.find((e) => e.id === id);
    const msg = ev?.recurring ? "Ganze Terminserie wirklich löschen?" : "Termin wirklich löschen?";
    if (!confirm(msg)) return;
    await p.events(events.filter((e) => e.id !== id));
    showToast("Gelöscht");
    setSelectedDate(null);
  };

  return h("div", { style: { paddingBottom: 24 }, className: "fadeIn" },
    h(PageTitle, { title: "Kalender", subtitle: "Termine & Pläne",
      right: h("div", { style: { display: "flex", gap: 6 } },
        h("button", { onClick: () => setView(view === "month" ? "agenda" : "month"), style: st.iconBtn, "aria-label": "Ansicht wechseln" },
          view === "month" ? I.List({ color: c.inkSoft }) : I.Grid({ color: c.inkSoft })
        )
      )
    }),

    // Filter
    h("div", { style: { display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", paddingBottom: 2 } },
      h("button", { onClick: () => setFilter("all"), style: { ...st.chip, flexShrink: 0, ...(filter === "all" ? st.chipActive : {}) } }, "Alle"),
      h("button", { onClick: () => setFilter("shared"), style: { ...st.chip, flexShrink: 0, ...(filter === "shared" ? { background: c.forest, color: "#fff", borderColor: c.forest } : {}) } }, "Gemeinsam"),
      users.map((u) =>
        h("button", { key: u, onClick: () => setFilter(u),
          style: { ...st.chip, flexShrink: 0, ...(filter === u ? { background: u === currentUser ? c.accent : c.ochre, color: "#fff", borderColor: u === currentUser ? c.accent : c.ochre } : {}) }
        }, u)
      )
    ),

    view === "month"
      ? h(MonthView, { cursor, setCursor, events: filtered, currentUser, onDayClick: (d) => setSelectedDate(d) })
      : h(AgendaView, { events: filtered, currentUser, users, onSelect: (e) => { setEditing(findOriginal(e)); setShowForm(true); } }),

    selectedDate && h(DayDetailModal, {
      date: selectedDate,
      events: filtered.filter((e) => eventOnDate(e, selectedDate)),
      users, currentUser,
      onClose: () => setSelectedDate(null),
      onEdit: (e) => { setEditing(findOriginal(e)); setShowForm(true); setSelectedDate(null); },
      onDelete: remove,
      onAdd: () => { setEditing({ date: selectedDate }); setShowForm(true); setSelectedDate(null); }
    }),

    h(FAB, { onClick: () => { setEditing(null); setShowForm(true); } }),

    showForm && h(EventForm, { currentUser, users, editing, onClose: () => { setShowForm(false); setEditing(null); }, onSave: upsert })
  );
}

function MonthView({ cursor, setCursor, events, currentUser, onDayClick }) {
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7; // Montag = 0
  const daysInMonth = lastDay.getDate();
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

  const eventsByDate = useMemo(() => {
    const map = {};
    events.forEach((e) => {
      eventDates(e).forEach((d) => {
        if (!map[d]) map[d] = [];
        map[d].push(e);
      });
    });
    return map;
  }, [events]);

  const prevMonth = () => setCursor(new Date(year, month - 1, 1));
  const nextMonth = () => setCursor(new Date(year, month + 1, 1));
  const goToday = () => setCursor(new Date());

  const todayStr = today();

  return h("div", null,
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
      h("button", { onClick: prevMonth, style: st.iconBtn, "aria-label": "Zurück" }, I.ChevLeft({ color: c.inkSoft, size: 16 })),
      h("button", { onClick: goToday, style: { background: "transparent", border: "none", fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 500, color: c.ink, letterSpacing: -0.3 } },
        cursor.toLocaleDateString("de-DE", { month: "long", year: "numeric" })
      ),
      h("button", { onClick: nextMonth, style: st.iconBtn, "aria-label": "Vor" }, I.ChevRight({ color: c.inkSoft, size: 16 }))
    ),

    // Weekday header
    h("div", { style: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, marginBottom: 6 } },
      ["M", "D", "M", "D", "F", "S", "S"].map((d, i) =>
        h("div", { key: i, style: { textAlign: "center", fontSize: 10, color: c.inkFaint, letterSpacing: 1, fontWeight: 500, padding: "4px 0" } }, d)
      )
    ),

    // Days grid
    h("div", { style: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 } },
      Array.from({ length: totalCells }).map((_, i) => {
        const dayNum = i - startOffset + 1;
        const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
        if (!inMonth) return h("div", { key: i, style: { aspectRatio: "1", borderRadius: 8 } });

        const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(dayNum).padStart(2, "0")}`;
        const dayEvents = eventsByDate[dateStr] || [];
        const isToday = dateStr === todayStr;
        const hasEvents = dayEvents.length > 0;

        // Mehrtägige Events bekommen einen Strich, eintägige Punkte
        const multiDay = dayEvents.filter((e) => e.endDate);
        const singleDay = dayEvents.filter((e) => !e.endDate);
        // Mehrtägige: pro Event eine Linie mit eigener Farbe
        const multiDayBars = multiDay
          .sort((a, b) => a.date.localeCompare(b.date) || (a.id || "").localeCompare(b.id || ""))
          .map((e) => eventColor(e, currentUser))
          .slice(0, 3);
        // Eintägige: nach Farbe deduplizieren (sonst zu viele Punkte)
        const dotColors = [...new Set(singleDay.map((e) => eventColor(e, currentUser)))].slice(0, 3);

        return h("button", { key: i,
          onClick: () => onDayClick(dateStr),
          style: {
            aspectRatio: "1",
            borderRadius: 10,
            background: isToday ? c.accent : hasEvents ? c.surface : "transparent",
            border: isToday ? "none" : hasEvents ? `1px solid ${c.border}` : "none",
            color: isToday ? c.surface : c.ink,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            position: "relative",
            fontSize: 14,
            fontWeight: isToday ? 600 : 400,
            fontFamily: "'Inter', sans-serif",
            padding: 0,
          }
        },
          h("div", null, dayNum),
          // Strichliste für mehrtägige Events oben
          multiDayBars.length > 0 && h("div", { style: { display: "flex", flexDirection: "column", gap: 2, position: "absolute", top: 4, left: 4, right: 4 } },
            multiDayBars.map((col, j) => h("div", { key: j, style: { height: 2, borderRadius: 1, background: isToday ? "rgba(255,255,255,0.7)" : col } }))
          ),
          // Punkte für eintägige Events unten
          dotColors.length > 0 && h("div", { style: { display: "flex", gap: 2, position: "absolute", bottom: 6 } },
            dotColors.map((col, j) => h("div", { key: j, style: { width: 4, height: 4, borderRadius: "50%", background: isToday ? "rgba(255,255,255,0.7)" : col } }))
          )
        );
      })
    )
  );
}

function AgendaView({ events, currentUser, users, onSelect }) {
  const t = today();

  // Mehrtägige Events, die gerade laufen (heute innerhalb des Zeitraums)
  const ongoing = useMemo(() => {
    return events
      .filter((e) => e.endDate && e.date <= t && e.endDate >= t)
      .sort((a, b) => a.date.localeCompare(b.date));
  }, [events, t]);

  const upcoming = useMemo(() => {
    return events
      .filter((e) => e.date >= t && !ongoing.includes(e))
      .sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return (a.time || "").localeCompare(b.time || "");
      });
  }, [events, t, ongoing]);

  const past = useMemo(() => {
    return events
      .filter((e) => {
        const end = e.endDate || e.date;
        return end < t;
      })
      .sort((a, b) => (b.endDate || b.date).localeCompare(a.endDate || a.date))
      .slice(0, 20);
  }, [events, t]);

  const grouped = useMemo(() => {
    const map = {};
    upcoming.forEach((e) => {
      if (!map[e.date]) map[e.date] = [];
      map[e.date].push(e);
    });
    return Object.entries(map);
  }, [upcoming]);

  if (upcoming.length === 0 && past.length === 0 && ongoing.length === 0) {
    return h(Empty, { text: "Noch keine Termine" });
  }

  return h("div", null,
    ongoing.length > 0 && h("div", { style: { marginBottom: 18 } },
      h("div", { style: { ...st.eyebrow, padding: "4px 4px 8px", color: c.accent } }, "Läuft gerade"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
        ongoing.map((e) => h(EventRow, { key: e.id, event: e, currentUser, onClick: () => onSelect(e), showDate: true }))
      )
    ),
    grouped.map(([date, items]) => {
      const isToday = date === t;
      return h("div", { key: date, style: { marginBottom: 18 } },
        h("div", { style: { ...st.eyebrow, padding: "4px 4px 8px", color: isToday ? c.accent : c.inkFaint } },
          isToday ? "Heute" : fmtDate(date, { weekday: "long", day: "numeric", month: "long" })
        ),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
          items.map((e) => h(EventRow, { key: e.id, event: e, currentUser, onClick: () => onSelect(e) }))
        )
      );
    }),
    past.length > 0 && h("div", { style: { marginTop: 24 } },
      h("div", { style: { ...st.eyebrow, padding: "4px 4px 8px" } }, "Vergangene Termine"),
      h("div", { style: { display: "flex", flexDirection: "column", gap: 6, opacity: 0.55 } },
        past.map((e) => h(EventRow, { key: e.id, event: e, currentUser, onClick: () => onSelect(e), showDate: true }))
      )
    )
  );
}

function EventRow({ event, currentUser, onClick, showDate }) {
  const color = eventColor(event, currentUser);
  const isMultiDay = !!event.endDate;
  const totalDays = isMultiDay ? daysBetween(event.date, event.endDate) + 1 : 1;

  // Bei mehrtägigen: Zeitraum darstellen
  const dateLabel = isMultiDay
    ? `${fmtDate(event.date, { day: "numeric", month: "short" })} – ${fmtDate(event.endDate, { day: "numeric", month: "short" })} · ${totalDays} Tage`
    : showDate ? fmtDate(event.date, { day: "numeric", month: "short" }) : null;

  return h("button", { onClick, style: { ...st.row, padding: "12px 14px", textAlign: "left", width: "100%" } },
    h("div", { style: { width: 4, alignSelf: "stretch", background: color, borderRadius: 2, marginRight: 12 } }),
    h("div", { style: { flex: 1, minWidth: 0 } },
      h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 14.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 6 } },
        event.recurring && I.Repeat({ size: 11, color: c.inkFaint }),
        h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, event.title)
      ),
      h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginTop: 2, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" } },
        dateLabel && h("span", null, dateLabel),
        event.time && !isMultiDay && h("span", null, `${dateLabel ? "· " : ""}${event.time}`),
        h("span", null, `${dateLabel || event.time ? "· " : ""}${event.who === "shared" ? "Gemeinsam" : event.who}`),
        event.location && h("span", null, `· ${event.location}`)
      )
    )
  );
}

function DayDetailModal({ date, events, users, currentUser, onClose, onEdit, onDelete, onAdd }) {
  return h(Modal, { onClose, title: fmtDate(date, { weekday: "long", day: "numeric", month: "long" }) },
    events.length === 0
      ? h(Empty, { text: "Keine Termine an diesem Tag" })
      : h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          events.sort((a, b) => (a.time || "").localeCompare(b.time || "")).map((e) => {
            const color = eventColor(e, currentUser);
            const isMultiDay = !!e.endDate;
            const totalDays = isMultiDay ? daysBetween(e.date, e.endDate) + 1 : 1;
            const dayNumber = isMultiDay ? daysBetween(e.date, date) + 1 : 1;
            return h("div", { key: e.id, style: { ...st.row, padding: "12px 14px", flexDirection: "column", alignItems: "stretch", gap: 8 } },
              h("div", { style: { display: "flex", alignItems: "flex-start", gap: 12 } },
                h("div", { style: { width: 4, alignSelf: "stretch", background: color, borderRadius: 2, minHeight: 32 } }),
                h("div", { style: { flex: 1, minWidth: 0 } },
                  h("div", { style: { fontWeight: 500, color: c.ink, fontSize: 15, display: "flex", alignItems: "center", gap: 6 } },
                    e.recurring && I.Repeat({ size: 12, color: c.inkFaint }),
                    h("span", null, e.title)
                  ),
                  h("div", { style: { fontSize: 11.5, color: c.inkSoft, marginTop: 3 } },
                    isMultiDay
                      ? `Tag ${dayNumber} von ${totalDays} · ${fmtDate(e.date, { day: "numeric", month: "short" })}–${fmtDate(e.endDate, { day: "numeric", month: "short" })}`
                      : (e.time ? e.time : "Ganztägig"),
                    " · ",
                    e.who === "shared" ? "Gemeinsam" : e.who,
                    e.recurring && ` · ${eventRecurringLabel(e.recurring)}`
                  ),
                  e.location && h("div", { style: { fontSize: 12, color: c.inkSoft, marginTop: 2 } }, `📍 ${e.location}`),
                  e.notes && h("div", { style: { fontSize: 14, color: c.inkSoft, marginTop: 6, fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif", lineHeight: 1.4 } }, e.notes)
                )
              ),
              h("div", { style: { display: "flex", gap: 8 } },
                h("button", { onClick: () => onEdit(e), style: st.smallBtn }, I.Edit({ size: 11 }), " Bearbeiten"),
                h("button", { onClick: () => onDelete(e.id), style: { ...st.smallBtn, color: c.warn } }, I.Trash({ size: 11 }), " Löschen")
              )
            );
          })
        ),
    h("button", { onClick: onAdd, style: st.primaryBtn },
      I.Plus({ size: 15, strokeWidth: 2, color: c.surface }), " Termin hinzufügen"
    )
  );
}

function EventForm({ currentUser, users, editing, onClose, onSave }) {
  const [title, setTitle] = useState(editing?.title || "");
  const [date, setDate] = useState(editing?.date || today());
  const [endDate, setEndDate] = useState(editing?.endDate || "");
  const [isMultiDay, setIsMultiDay] = useState(!!editing?.endDate);
  const [hasTime, setHasTime] = useState(!!editing?.time);
  const [time, setTime] = useState(editing?.time || "18:00");
  const [who, setWho] = useState(editing?.who || "shared");
  const [location, setLocation] = useState(editing?.location || "");
  const [notes, setNotes] = useState(editing?.notes || "");
  const [color, setColor] = useState(editing?.color || null);
  const [recurring, setRecurring] = useState(editing?.recurring || null);
  const [recurringUntil, setRecurringUntil] = useState(editing?.recurringUntil || "");
  const [hasRecurringEnd, setHasRecurringEnd] = useState(!!editing?.recurringUntil);

  // Wenn mehrtägig aktiviert wird, Enddatum sinnvoll vorbelegen
  const toggleMultiDay = () => {
    const next = !isMultiDay;
    setIsMultiDay(next);
    if (next && !endDate) {
      const d = new Date(date);
      d.setDate(d.getDate() + 1);
      setEndDate(d.toISOString().slice(0, 10));
    }
    if (next) setHasTime(false);
  };

  const updateDate = (newDate) => {
    setDate(newDate);
    if (endDate && newDate > endDate) {
      const d = new Date(newDate);
      d.setDate(d.getDate() + 1);
      setEndDate(d.toISOString().slice(0, 10));
    }
  };

  const submit = () => {
    if (!title.trim()) return;
    const validEnd = isMultiDay && endDate && endDate > date ? endDate : null;
    onSave({
      id: editing?.id || uid(),
      title: title.trim(),
      date,
      endDate: validEnd,
      time: hasTime && !isMultiDay ? time : null,
      who,
      location: location.trim() || null,
      notes: notes.trim() || null,
      color: color || null,
      recurring: recurring || null,
      recurringUntil: recurring && hasRecurringEnd && recurringUntil ? recurringUntil : null,
    });
  };

  // Vorschau-Farbe: gewählt > Default
  const previewColor = color || (who === "shared" ? c.forest : who === currentUser ? c.accent : c.ochre);

  return h(Modal, { onClose, title: editing?.id ? "Termin bearbeiten" : "Neuer Termin" },
    h(Field, { label: "Was?" },
      h("input", { autoFocus: !editing?.id, value: title, onChange: (e) => setTitle(e.target.value), style: st.input, placeholder: "z. B. Zahnarzt, Urlaub Spanien…" })
    ),

    isMultiDay
      ? h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
          h(Field, { label: "Von" },
            h("input", { type: "date", value: date, onChange: (e) => updateDate(e.target.value), style: st.input })
          ),
          h(Field, { label: "Bis" },
            h("input", { type: "date", value: endDate, min: date, onChange: (e) => setEndDate(e.target.value), style: st.input })
          )
        )
      : h("div", { style: { display: "grid", gridTemplateColumns: hasTime ? "1fr 1fr" : "1fr", gap: 10 } },
          h(Field, { label: "Datum" },
            h("input", { type: "date", value: date, onChange: (e) => updateDate(e.target.value), style: st.input })
          ),
          hasTime && h(Field, { label: "Uhrzeit" },
            h("input", { type: "time", value: time, onChange: (e) => setTime(e.target.value), style: st.input })
          )
        ),

    h("button", { onClick: toggleMultiDay,
      style: { ...st.row, justifyContent: "space-between", padding: "11px 14px", background: isMultiDay ? c.forestSoft : c.surface, borderColor: isMultiDay ? c.forest + "40" : c.border }
    },
      h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
        I.Calendar({ size: 15, color: isMultiDay ? c.forest : c.inkSoft }),
        h("span", { style: { fontSize: 13.5, color: c.ink, fontWeight: 500 } }, "Mehrtägig")
      ),
      h("div", { style: { ...st.toggle, background: isMultiDay ? c.forest : c.borderStrong } },
